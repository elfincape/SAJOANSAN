<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>코스 편집 · 코스표 관리 시스템</title>
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 드래그 정렬 -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    /* 드래그 중 행 스타일 */
    .stop-row.sortable-ghost  { opacity: 0.35; }
    .stop-row.sortable-chosen { background: rgba(16,185,129,0.10) !important; }
    .drag-handle {
      cursor: grab; user-select: none;
      color: #71717a;
    }
    .drag-handle:hover { color: #f4f4f5; }
  </style>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen flex flex-col">

  <!-- 헤더 -->
  <header class="border-b border-zinc-800 sticky top-0 z-30 bg-zinc-900/95 backdrop-blur">
    <div class="max-w-[1600px] mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/admin/routes.html" class="text-xs text-zinc-400 hover:text-zinc-100">← 코스 목록</a>
      <h1 class="text-base font-semibold">코스 편집</h1>
      <div class="flex-1"></div>
      <span id="user-badge" class="text-xs text-zinc-400 hidden sm:inline"></span>
      <a href="/" class="btn btn-ghost">대시보드</a>
    </div>
  </header>

  <main class="flex-1 max-w-[1600px] w-full mx-auto px-4 py-3">
    <!-- 코스 정보 (읽기 전용) -->
    <section id="route-info" class="border border-zinc-700 rounded-lg p-3 mb-3 bg-zinc-800/40">
      <div id="route-info-body" class="text-sm text-zinc-300">불러오는 중...</div>
    </section>

    <!-- 툴바 -->
    <div class="flex flex-wrap items-center gap-2 mb-2">
      <button id="add-stop-btn"   class="btn btn-primary">+ 정거장 추가</button>
      <button id="dup-last-btn"   class="btn btn-ghost text-xs" title="마지막 정거장을 복제 (시간 +30분)">마지막 복제</button>
      <button id="shift-plus-btn"  class="btn btn-ghost text-xs">선택 +30분</button>
      <button id="shift-minus-btn" class="btn btn-ghost text-xs">선택 -30분</button>
      <button id="auto-sort-btn"  class="btn btn-ghost text-xs" title="입차시간 오름차순으로 순서 재배정">입차시간순 재정렬</button>
      <div class="flex-1"></div>
      <span id="result-count" class="text-xs text-zinc-400"></span>
    </div>

    <!-- 정거장 테이블 -->
    <div class="table-wrap" style="max-height: calc(100vh - 280px);">
      <table class="app-table" id="stops-table">
        <thead>
          <tr>
            <th style="width:32px;"><input type="checkbox" id="select-all"></th>
            <th class="text-right" style="width:64px;">순서</th>
            <th>코드</th>
            <th>납품처</th>
            <th class="biz-time">입차</th>
            <th class="biz-time">하차시작</th>
            <th class="biz-time">하차종료</th>
            <th class="biz-time">마감</th>
            <th class="biz-time">여유</th>
            <th>★</th>
            <th>비고</th>
            <th class="text-right">작업</th>
          </tr>
        </thead>
        <tbody id="stops-tbody"></tbody>
      </table>
      <div id="empty-msg" class="hidden text-center text-sm text-zinc-500 py-12">
        등록된 정거장이 없습니다. "+ 정거장 추가"로 시작하세요.
      </div>
    </div>
  </main>

  <script type="module">
    import { supabase } from '/js/supabase.js';
    import { requireRole } from '/js/auth.js';
    import { bizMinToDisplay, displayToBizMin, formatSlack } from '/js/time.js';
    import { toast, openModal, closeModal, confirmDialog } from '/js/ui.js';

    // =========================================================================
    // 0. 권한 + URL 파라미터
    // =========================================================================
    const profile = await requireRole('editor');
    if (!profile) { /* 리다이렉트 */ }
    document.getElementById('user-badge').textContent =
      `${profile.display_name || profile.email || ''} (${profile.role})`;

    const params = new URLSearchParams(location.search);
    const routeId = params.get('id');
    if (!routeId) {
      toast('잘못된 접근입니다.', 'error');
      setTimeout(() => location.replace('/admin/routes.html'), 600);
      throw new Error('no route id');
    }

    // =========================================================================
    // 1. 상태
    // =========================================================================
    const state = {
      route: null,
      stops: [],            // route_stops 행
      points: [],           // delivery_points (선택 드롭다운용)
      pointById: new Map(),
      // 보조 메타
      company: null,
      primaryDriver: null,
      primaryVehicle: null,
      secondaryDriver: null,
      secondaryVehicle: null
    };
    const $ = (id) => document.getElementById(id);

    // =========================================================================
    // 2. 부트
    // =========================================================================
    bindToolbar();
    await loadAll();
    renderRouteInfo();
    renderStops();
    initSortable();

    // =========================================================================
    // 3. 데이터 로드
    // =========================================================================
    async function loadAll() {
      try {
        const [route, stops, points] = await Promise.all([
          supabase.from('routes').select('*').eq('id', routeId).maybeSingle(),
          supabase.from('route_stops').select('*').eq('route_id', routeId).order('stop_order'),
          supabase.from('delivery_points').select('id, code, name, region, deadline_text, deadline_business_min, delivery_method, access_method, delivery_location').order('code')
        ]);

        if (route.error) throw route.error;
        if (!route.data) {
          toast('해당 코스를 찾을 수 없습니다.', 'error');
          setTimeout(() => location.replace('/admin/routes.html'), 600);
          return;
        }
        state.route = route.data;
        state.stops = stops.data || [];
        state.points = points.data || [];
        state.pointById = new Map(state.points.map(p => [p.id, p]));

        // 코스 메타 보강 (이름 표시용)
        const need = [
          state.route.company_id, state.route.primary_driver_id, state.route.primary_vehicle_id,
          state.route.secondary_driver_id, state.route.secondary_vehicle_id
        ].filter(Boolean);

        if (need.length) {
          const [cc, dd, vv] = await Promise.all([
            state.route.company_id
              ? supabase.from('companies').select('id, name').eq('id', state.route.company_id).maybeSingle()
              : Promise.resolve({ data: null }),
            supabase.from('drivers').select('id, name, phone')
              .in('id', [state.route.primary_driver_id, state.route.secondary_driver_id].filter(Boolean)),
            supabase.from('vehicles').select('id, plate_number, tonnage')
              .in('id', [state.route.primary_vehicle_id, state.route.secondary_vehicle_id].filter(Boolean))
          ]);
          state.company = cc.data;
          const dMap = new Map((dd.data || []).map(x => [x.id, x]));
          const vMap = new Map((vv.data || []).map(x => [x.id, x]));
          state.primaryDriver    = dMap.get(state.route.primary_driver_id)    || null;
          state.secondaryDriver  = dMap.get(state.route.secondary_driver_id)  || null;
          state.primaryVehicle   = vMap.get(state.route.primary_vehicle_id)   || null;
          state.secondaryVehicle = vMap.get(state.route.secondary_vehicle_id) || null;
        }
      } catch (e) {
        toast('코스 정보를 불러오지 못했습니다.', 'error');
      }
    }

    // =========================================================================
    // 4. 렌더 - 코스 정보 / 정거장 표
    // =========================================================================
    function renderRouteInfo() {
      const r = state.route;
      if (!r) return;
      $('route-info-body').innerHTML = `
        <div class="flex flex-wrap gap-x-6 gap-y-1">
          <div><span class="muted">코스</span> <strong>${escapeHtml(r.name)}</strong></div>
          <div><span class="muted">호차</span> ${escapeHtml(r.car_number || '-')}</div>
          <div><span class="muted">운수사</span> ${escapeHtml(state.company?.name || '-')}</div>
          <div><span class="muted">주기사</span> ${escapeHtml(state.primaryDriver?.name || '-')}</div>
          <div><span class="muted">주차량</span> ${escapeHtml(state.primaryVehicle?.plate_number || '-')}${state.primaryVehicle?.tonnage ? ' · ' + state.primaryVehicle.tonnage + 't' : ''}</div>
          ${state.secondaryDriver  ? `<div><span class="muted">보조기사</span> ${escapeHtml(state.secondaryDriver.name)}</div>` : ''}
          ${state.secondaryVehicle ? `<div><span class="muted">보조차량</span> ${escapeHtml(state.secondaryVehicle.plate_number)}</div>` : ''}
          <div class="ml-auto"><a href="/admin/routes.html" class="text-xs text-emerald-400 hover:underline">코스 정보 편집 →</a></div>
        </div>
      `;
    }

    function renderStops() {
      const tbody = $('stops-tbody');
      const empty = $('empty-msg');
      tbody.innerHTML = '';

      if (state.stops.length === 0) {
        empty.classList.remove('hidden');
        $('result-count').textContent = '정거장 0개';
        return;
      }
      empty.classList.add('hidden');
      $('result-count').textContent = `정거장 ${state.stops.length}개`;

      // stop_order 오름차순으로 정렬해 표시
      state.stops.sort((a, b) => (a.stop_order ?? 0) - (b.stop_order ?? 0));

      const frag = document.createDocumentFragment();
      for (const s of state.stops) {
        const dp = state.pointById.get(s.delivery_point_id);
        const effDeadlineMin =
          s.deadline_business_min != null ? s.deadline_business_min : dp?.deadline_business_min;
        const slack =
          (effDeadlineMin != null && s.unloading_end_business_min != null)
            ? effDeadlineMin - s.unloading_end_business_min : null;

        const hasOverride =
          s.override_delivery_method != null ||
          s.override_access_method   != null ||
          s.override_delivery_location != null;

        const slackHtml = renderSlack(slack);
        const deadlineWarn = (effDeadlineMin != null && s.unloading_end_business_min != null
                              && effDeadlineMin < s.unloading_end_business_min);

        const tr = document.createElement('tr');
        tr.className = 'stop-row';
        tr.dataset.id = s.id;
        tr.innerHTML = `
          <td><input type="checkbox" class="row-check" data-id="${s.id}"></td>
          <td class="text-right">
            <span class="drag-handle inline-block mr-1" title="끌어서 순서 변경">⋮⋮</span>
            <span class="tnum">${s.stop_order ?? ''}</span>
          </td>
          <td>${escapeHtml(dp?.code || '-')}</td>
          <td>${escapeHtml(dp?.name || '(삭제됨)')}<span class="ml-1 text-xs text-zinc-500">${escapeHtml(dp?.region || '')}</span></td>
          <td class="biz-time">${escapeHtml(bizMinToDisplay(s.arrival_business_min))}</td>
          <td class="biz-time">${escapeHtml(bizMinToDisplay(s.unloading_start_business_min))}</td>
          <td class="biz-time">${escapeHtml(bizMinToDisplay(s.unloading_end_business_min))}</td>
          <td class="biz-time ${deadlineWarn ? 'text-amber-400' : ''}">${escapeHtml(bizMinToDisplay(effDeadlineMin))}</td>
          <td class="biz-time">${slackHtml}</td>
          <td>${hasOverride ? '<span class="text-amber-300" title="오버라이드 있음">★</span>' : ''}</td>
          <td class="max-w-[180px] truncate" title="${escapeAttr(s.memo || '')}">${escapeHtml(s.memo || '')}</td>
          <td class="text-right whitespace-nowrap">
            <button class="btn btn-ghost text-xs" data-act="edit"   data-id="${s.id}">편집</button>
            <button class="btn btn-ghost text-xs text-rose-400" data-act="delete" data-id="${s.id}">삭제</button>
          </td>
        `;
        frag.appendChild(tr);
      }
      tbody.appendChild(frag);

      tbody.querySelectorAll('button[data-act]').forEach(b => {
        b.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = b.dataset.id;
          if (b.dataset.act === 'edit')   openStopForm(state.stops.find(x => x.id === id));
          if (b.dataset.act === 'delete') deleteStop(id);
        });
      });

      $('select-all').checked = false;
    }

    function renderSlack(min) {
      if (min == null) return '';
      let cls = 'slack-pos';
      if (min < 0) cls = 'slack-neg';
      else if (min < 30) cls = 'text-amber-400';
      return `<span class="${cls}">${escapeHtml(formatSlack(min))}</span>`;
    }

    // =========================================================================
    // 5. SortableJS - 드래그 정렬
    // =========================================================================
    let sortable = null;
    function initSortable() {
      const tbody = $('stops-tbody');
      if (sortable) sortable.destroy();
      sortable = Sortable.create(tbody, {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        onEnd: async () => {
          // DOM 순서 → state.stops 재배열 → DB 일괄 업데이트
          const newOrder = [...tbody.querySelectorAll('tr.stop-row')].map(tr => tr.dataset.id);
          const idToStop = new Map(state.stops.map(s => [s.id, s]));
          const reordered = newOrder.map((id, idx) => {
            const s = idToStop.get(id);
            return { ...s, stop_order: idx + 1 };
          });

          // 낙관적 적용
          const backup = state.stops;
          state.stops = reordered;
          renderStops();

          try {
            // 충돌 방지: stop_order에 일시적으로 큰 음수 부여 후 정식 번호로 재할당
            // 단순화를 위해 그냥 upsert(merge)로 한 번에 보낸다 (정거장 수가 많지 않다고 가정).
            const payload = reordered.map(s => ({ id: s.id, route_id: routeId, delivery_point_id: s.delivery_point_id, stop_order: s.stop_order }));
            const { error } = await supabase.from('route_stops').upsert(payload, { onConflict: 'id' });
            if (error) throw error;
            toast('순서를 저장했습니다.', 'success');
          } catch (e) {
            toast('순서 저장 실패. 되돌립니다.', 'error');
            state.stops = backup;
            renderStops();
          }
        }
      });
    }

    // =========================================================================
    // 6. 정거장 추가/편집 모달
    // =========================================================================
    function openStopForm(stop) {
      const isEdit = !!stop;

      const wrap = document.createElement('div');
      wrap.className = 'p-5 max-h-[85vh] overflow-auto';
      wrap.innerHTML = `
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-base font-semibold">${isEdit ? '정거장 편집' : '정거장 추가'}</h2>
          <button data-x class="btn btn-ghost text-xs">닫기</button>
        </div>
        <form id="stop-form" class="space-y-3" novalidate>
          <div>
            <label class="app-label">납품처 *</label>
            <input id="dp-search" class="app-input" placeholder="코드 또는 이름으로 검색" autocomplete="off">
            <div id="dp-results" class="mt-1 max-h-40 overflow-auto border border-zinc-700 rounded-md bg-zinc-900 hidden"></div>
            <div id="dp-selected" class="mt-1 text-xs"></div>
            <input type="hidden" id="dp-id">
          </div>

          <div class="grid grid-cols-3 gap-3">
            <div>
              <label class="app-label">순서</label>
              <input id="s-order" type="number" min="1" class="app-input">
            </div>
            <div>
              <label class="app-label">입차 *</label>
              <input id="s-arrival" class="app-input biz-time" placeholder="예: 22:00">
            </div>
            <div>
              <label class="app-label">하차시작</label>
              <input id="s-ustart" class="app-input biz-time" placeholder="예: 22:10">
            </div>
            <div>
              <label class="app-label">하차종료</label>
              <input id="s-uend" class="app-input biz-time" placeholder="예: 22:30">
            </div>
            <div class="col-span-2">
              <label class="app-label">마감 (정거장 단위 오버라이드, 비우면 납품처 기본값)</label>
              <input id="s-deadline" class="app-input biz-time" placeholder="비워두면 납품처 마감 사용">
            </div>
          </div>

          <details class="border border-zinc-700 rounded-md">
            <summary class="px-3 py-2 cursor-pointer text-sm">고급 설정 (오버라이드)</summary>
            <div class="p-3 grid grid-cols-3 gap-3">
              <div>
                <label class="app-label">납품방식</label>
                <select id="ov-dmethod" class="app-select">
                  <option value="">기본값 사용</option>
                  <option value="대면">대면</option>
                  <option value="검수">검수</option>
                  <option value="무인">무인</option>
                </select>
              </div>
              <div>
                <label class="app-label">진입방식</label>
                <select id="ov-amethod" class="app-select">
                  <option value="">기본값 사용</option>
                  <option value="보안키">보안키</option>
                  <option value="열쇠">열쇠</option>
                  <option value="없음">없음</option>
                </select>
              </div>
              <div>
                <label class="app-label">납품장소</label>
                <select id="ov-dloc" class="app-select">
                  <option value="">기본값 사용</option>
                  <option value="창고">창고</option>
                  <option value="탑차">탑차</option>
                  <option value="야적">야적</option>
                </select>
              </div>
            </div>
          </details>

          <div>
            <label class="app-label">비고</label>
            <textarea id="s-memo" rows="2" class="app-textarea"></textarea>
          </div>

          <div id="form-warn" class="hidden text-xs text-amber-400 bg-amber-900/20 border border-amber-900/40 rounded-md px-3 py-2"></div>

          <div class="flex items-center gap-2 pt-2 border-t border-zinc-700">
            <button type="submit" class="btn btn-primary">저장</button>
            <button type="button" data-x class="btn btn-ghost">취소</button>
          </div>
        </form>
      `;

      openModal(wrap, { width: 'xl' });
      wrap.querySelectorAll('[data-x]').forEach(b => b.addEventListener('click', closeModal));

      // ----- 납품처 검색 (간단 자동완성) -----
      const search = wrap.querySelector('#dp-search');
      const results = wrap.querySelector('#dp-results');
      const selected = wrap.querySelector('#dp-selected');
      const dpIdInput = wrap.querySelector('#dp-id');

      function setSelectedDp(p) {
        if (p) {
          dpIdInput.value = p.id;
          selected.innerHTML = `선택: <strong>${escapeHtml(p.code || '')}</strong> · ${escapeHtml(p.name)} <span class="muted">${escapeHtml(p.region || '')}</span>`;
          search.value = `${p.code || ''} ${p.name}`.trim();
        } else {
          dpIdInput.value = '';
          selected.innerHTML = '';
        }
        results.classList.add('hidden');
      }

      search.addEventListener('input', () => {
        const q = search.value.trim().toLowerCase();
        if (!q) { results.classList.add('hidden'); return; }
        const hits = state.points.filter(p =>
          (p.code || '').toLowerCase().includes(q) ||
          (p.name || '').toLowerCase().includes(q)
        ).slice(0, 30);
        if (hits.length === 0) {
          results.classList.add('hidden');
          return;
        }
        results.innerHTML = hits.map(p =>
          `<div class="px-2 py-1.5 text-sm hover:bg-zinc-700 cursor-pointer" data-id="${p.id}">
             <strong>${escapeHtml(p.code || '')}</strong> · ${escapeHtml(p.name)} <span class="muted text-xs">${escapeHtml(p.region || '')}</span>
           </div>`
        ).join('');
        results.classList.remove('hidden');
        results.querySelectorAll('[data-id]').forEach(el => {
          el.addEventListener('click', () => {
            const p = state.pointById.get(el.dataset.id);
            setSelectedDp(p);
          });
        });
      });

      // ----- 시간 입력 정규화 -----
      ['s-arrival', 's-ustart', 's-uend', 's-deadline'].forEach(id => {
        const el = wrap.querySelector('#' + id);
        el.addEventListener('blur', () => {
          const v = el.value.trim();
          if (!v) return;
          const norm = normalizeTime(v);
          if (!norm) {
            toast('시간 형식이 올바르지 않습니다. 예: 22:00, 25:30', 'warn');
            return;
          }
          if (displayToBizMin(norm) == null) {
            toast('시간은 04:00 ~ 27:59 범위여야 합니다.', 'warn');
            return;
          }
          el.value = norm;
        });
      });

      // ----- 초기값 -----
      if (isEdit) {
        const dp = state.pointById.get(stop.delivery_point_id);
        setSelectedDp(dp);
        wrap.querySelector('#s-order').value    = stop.stop_order ?? '';
        wrap.querySelector('#s-arrival').value  = stop.arrival_text || (stop.arrival_business_min != null ? bizMinToDisplay(stop.arrival_business_min) : '');
        wrap.querySelector('#s-ustart').value   = stop.unloading_start_text || (stop.unloading_start_business_min != null ? bizMinToDisplay(stop.unloading_start_business_min) : '');
        wrap.querySelector('#s-uend').value     = stop.unloading_end_text || (stop.unloading_end_business_min != null ? bizMinToDisplay(stop.unloading_end_business_min) : '');
        wrap.querySelector('#s-deadline').value = stop.deadline_text || (stop.deadline_business_min != null ? bizMinToDisplay(stop.deadline_business_min) : '');
        wrap.querySelector('#ov-dmethod').value = stop.override_delivery_method || '';
        wrap.querySelector('#ov-amethod').value = stop.override_access_method || '';
        wrap.querySelector('#ov-dloc').value    = stop.override_delivery_location || '';
        wrap.querySelector('#s-memo').value     = stop.memo || '';
      } else {
        // 신규: 순서 = max+1
        const nextOrder = state.stops.reduce((m, s) => Math.max(m, s.stop_order || 0), 0) + 1;
        wrap.querySelector('#s-order').value = nextOrder;
      }

      // ----- 저장 -----
      wrap.querySelector('#stop-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await saveStop({ wrap, isEdit, stop });
      });
    }

    // =========================================================================
    // 7. 정거장 저장 (검증 포함)
    // =========================================================================
    async function saveStop({ wrap, isEdit, stop }) {
      const dpId = wrap.querySelector('#dp-id').value;
      if (!dpId) {
        toast('납품처를 선택해주세요.', 'warn');
        return;
      }

      const arrTxt   = normalizeTime(wrap.querySelector('#s-arrival').value.trim());
      const ustTxt   = normalizeTime(wrap.querySelector('#s-ustart').value.trim());
      const uenTxt   = normalizeTime(wrap.querySelector('#s-uend').value.trim());
      const dlTxt    = normalizeTime(wrap.querySelector('#s-deadline').value.trim());

      // 입차 필수 (다른 시간이 입력됐다면 입차도 있어야 함)
      const anyOther = ustTxt || uenTxt || dlTxt;
      if (!arrTxt && anyOther) {
        toast('입차시간이 비어 있으면 다른 시간을 입력할 수 없습니다.', 'warn');
        return;
      }

      const arrMin = arrTxt ? displayToBizMin(arrTxt) : null;
      const ustMin = ustTxt ? displayToBizMin(ustTxt) : null;
      const uenMin = uenTxt ? displayToBizMin(uenTxt) : null;
      const dlMin  = dlTxt  ? displayToBizMin(dlTxt)  : null;

      // 시간 일관성: 입차 < 하차시작 < 하차종료
      if (arrMin != null && ustMin != null && !(arrMin < ustMin)) {
        toast('입차 < 하차시작 이어야 합니다.', 'warn');
        return;
      }
      if (ustMin != null && uenMin != null && !(ustMin < uenMin)) {
        toast('하차시작 < 하차종료 이어야 합니다.', 'warn');
        return;
      }
      if (arrMin != null && uenMin != null && !(arrMin < uenMin)) {
        toast('입차 < 하차종료 이어야 합니다.', 'warn');
        return;
      }

      // 마감 < 하차종료 → 경고만 (저장 가능)
      const dp = state.pointById.get(dpId);
      const effDeadline = dlMin != null ? dlMin : dp?.deadline_business_min;
      const warnEl = wrap.querySelector('#form-warn');
      if (effDeadline != null && uenMin != null && effDeadline < uenMin) {
        warnEl.textContent = `⚠ 마감(${bizMinToDisplay(effDeadline)})이 하차종료(${bizMinToDisplay(uenMin)})보다 빠릅니다. 그대로 저장할까요?`;
        warnEl.classList.remove('hidden');
        const ok = await confirmDialog(warnEl.textContent, { okText: '저장', cancelText: '취소', danger: true });
        if (!ok) return;
      } else {
        warnEl.classList.add('hidden');
      }

      // 같은 납품처 중복 추가 경고 (신규일 때만)
      if (!isEdit) {
        const dup = state.stops.some(s => s.delivery_point_id === dpId);
        if (dup) {
          const ok = await confirmDialog(
            `이 코스에 같은 납품처가 이미 등록되어 있습니다.\n중복으로 추가할까요?`,
            { okText: '추가', cancelText: '취소' }
          );
          if (!ok) return;
        }
      }

      const order = parseInt(wrap.querySelector('#s-order').value, 10);
      const payload = {
        ...(isEdit ? { id: stop.id } : {}),
        route_id: routeId,
        delivery_point_id: dpId,
        stop_order: Number.isFinite(order) && order > 0 ? order : 1,

        arrival_text:                arrTxt || null,
        arrival_business_min:        arrMin,
        unloading_start_text:        ustTxt || null,
        unloading_start_business_min: ustMin,
        unloading_end_text:          uenTxt || null,
        unloading_end_business_min:  uenMin,
        deadline_text:               dlTxt || null,
        deadline_business_min:       dlMin,

        override_delivery_method:    nullIfEmpty(wrap.querySelector('#ov-dmethod').value),
        override_access_method:      nullIfEmpty(wrap.querySelector('#ov-amethod').value),
        override_delivery_location:  nullIfEmpty(wrap.querySelector('#ov-dloc').value),

        memo: nullIfEmpty(wrap.querySelector('#s-memo').value.trim())
      };

      try {
        const { error } = await supabase
          .from('route_stops')
          .upsert(payload, { onConflict: 'id' });
        if (error) {
          toast(`저장 실패: ${error.message}`, 'error');
          return;
        }
        toast(isEdit ? '수정되었습니다.' : '추가되었습니다.', 'success');
        closeModal();
        await loadAll();
        renderStops();
      } catch {
        toast('저장 중 오류가 발생했습니다.', 'error');
      }
    }

    // =========================================================================
    // 8. 정거장 삭제
    // =========================================================================
    async function deleteStop(id) {
      const s = state.stops.find(x => x.id === id);
      const dp = s ? state.pointById.get(s.delivery_point_id) : null;
      const ok = await confirmDialog(
        `정거장 "${dp?.name || s?.delivery_point_id || ''}"을(를) 삭제할까요?`,
        { okText: '삭제', cancelText: '취소', danger: true }
      );
      if (!ok) return;

      try {
        const { error } = await supabase.from('route_stops').delete().eq('id', id);
        if (error) {
          toast(`삭제 실패: ${error.message}`, 'error');
          return;
        }
        toast('삭제되었습니다.', 'success');
        await loadAll();
        renderStops();
      } catch {
        toast('삭제 중 오류가 발생했습니다.', 'error');
      }
    }

    // =========================================================================
    // 9. 툴바 - 추가/복제/시프트/자동정렬
    // =========================================================================
    function bindToolbar() {
      $('add-stop-btn').addEventListener('click', () => openStopForm(null));
      $('dup-last-btn').addEventListener('click', duplicateLast);
      $('shift-plus-btn').addEventListener('click',  () => shiftSelected(+30));
      $('shift-minus-btn').addEventListener('click', () => shiftSelected(-30));
      $('auto-sort-btn').addEventListener('click',   autoSortByArrival);
      $('select-all').addEventListener('change', (e) => {
        document.querySelectorAll('.row-check').forEach(cb => cb.checked = e.target.checked);
      });
    }

    async function duplicateLast() {
      if (state.stops.length === 0) {
        toast('복제할 정거장이 없습니다.', 'warn');
        return;
      }
      const last = state.stops[state.stops.length - 1];
      const shift = (m) => (m == null ? null : (m + 30) % 1440);

      const payload = {
        route_id: routeId,
        delivery_point_id: last.delivery_point_id,
        stop_order: (last.stop_order || state.stops.length) + 1,
        arrival_business_min:        shift(last.arrival_business_min),
        unloading_start_business_min: shift(last.unloading_start_business_min),
        unloading_end_business_min:  shift(last.unloading_end_business_min),
        deadline_business_min:       last.deadline_business_min, // 마감은 그대로
        arrival_text:                bizMinToDisplay(shift(last.arrival_business_min))         || null,
        unloading_start_text:        bizMinToDisplay(shift(last.unloading_start_business_min)) || null,
        unloading_end_text:          bizMinToDisplay(shift(last.unloading_end_business_min))   || null,
        deadline_text:               bizMinToDisplay(last.deadline_business_min)               || null,
        override_delivery_method:    last.override_delivery_method,
        override_access_method:      last.override_access_method,
        override_delivery_location:  last.override_delivery_location,
        memo: last.memo
      };

      try {
        const { error } = await supabase.from('route_stops').insert(payload);
        if (error) throw error;
        toast('마지막 정거장을 복제했습니다 (시간 +30분).', 'success');
        await loadAll();
        renderStops();
      } catch (e) {
        toast('복제에 실패했습니다.', 'error');
      }
    }

    async function shiftSelected(deltaMin) {
      const ids = [...document.querySelectorAll('.row-check:checked')].map(cb => cb.dataset.id);
      if (ids.length === 0) {
        toast('대상 정거장을 선택해주세요.', 'warn');
        return;
      }
      const ok = await confirmDialog(
        `${ids.length}개 정거장의 시간을 ${deltaMin > 0 ? '+' : ''}${deltaMin}분 이동할까요?`,
        { okText: '이동', cancelText: '취소' }
      );
      if (!ok) return;

      const shift = (m) => {
        if (m == null) return null;
        const v = m + deltaMin;
        if (v < 0 || v >= 1440) return null; // 영업일 범위 벗어나면 변경하지 않음
        return v;
      };

      const updates = state.stops.filter(s => ids.includes(s.id)).map(s => {
        const a = shift(s.arrival_business_min);
        const us = shift(s.unloading_start_business_min);
        const ue = shift(s.unloading_end_business_min);
        const dl = shift(s.deadline_business_min);
        return {
          id: s.id,
          route_id: routeId,
          delivery_point_id: s.delivery_point_id,
          arrival_business_min:         a  ?? s.arrival_business_min,
          unloading_start_business_min: us ?? s.unloading_start_business_min,
          unloading_end_business_min:   ue ?? s.unloading_end_business_min,
          deadline_business_min:        dl ?? s.deadline_business_min,
          arrival_text:                 a != null ? bizMinToDisplay(a) : s.arrival_text,
          unloading_start_text:         us != null ? bizMinToDisplay(us): s.unloading_start_text,
          unloading_end_text:           ue != null ? bizMinToDisplay(ue): s.unloading_end_text,
          deadline_text:                dl != null ? bizMinToDisplay(dl): s.deadline_text
        };
      });

      try {
        const { error } = await supabase.from('route_stops').upsert(updates, { onConflict: 'id' });
        if (error) throw error;
        toast('시간을 이동했습니다.', 'success');
        await loadAll();
        renderStops();
      } catch {
        toast('시간 이동에 실패했습니다.', 'error');
      }
    }

    async function autoSortByArrival() {
      if (state.stops.length < 2) return;
      const ok = await confirmDialog(
        '입차시간 오름차순으로 모든 정거장의 순서를 재배정할까요?',
        { okText: '재정렬', cancelText: '취소' }
      );
      if (!ok) return;

      const sorted = [...state.stops].sort((a, b) => {
        const av = a.arrival_business_min ?? Infinity;
        const bv = b.arrival_business_min ?? Infinity;
        return av - bv || (a.stop_order ?? 0) - (b.stop_order ?? 0);
      });

      const updates = sorted.map((s, i) => ({
        id: s.id, route_id: routeId, delivery_point_id: s.delivery_point_id,
        stop_order: i + 1
      }));
      try {
        const { error } = await supabase.from('route_stops').upsert(updates, { onConflict: 'id' });
        if (error) throw error;
        toast('순서를 재정렬했습니다.', 'success');
        await loadAll();
        renderStops();
      } catch {
        toast('재정렬에 실패했습니다.', 'error');
      }
    }

    // =========================================================================
    // 10. 헬퍼
    // =========================================================================
    function normalizeTime(str) {
      if (!str) return '';
      const m = String(str).trim().match(/^(\d{1,2})\s*[:.시]\s*(\d{1,2})\s*분?$/);
      if (!m) return '';
      const h  = parseInt(m[1], 10);
      const mn = parseInt(m[2], 10);
      if (Number.isNaN(h) || Number.isNaN(mn)) return '';
      if (mn < 0 || mn > 59) return '';
      if (h < 0 || h > 27) return '';
      return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
    }
    function nullIfEmpty(v) { return v === '' || v == null ? null : v; }
    function escapeHtml(s) {
      return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
        .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function escapeAttr(s) { return escapeHtml(s); }
  </script>
