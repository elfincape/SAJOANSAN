<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>차량 관리 · 코스표 관리 시스템</title>
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen flex flex-col">

  <header class="border-b border-zinc-800 sticky top-0 z-30 bg-zinc-900/95 backdrop-blur">
    <div class="max-w-[1200px] mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/admin/" class="text-xs text-zinc-400 hover:text-zinc-100">← 관리 허브</a>
      <h1 class="text-base font-semibold">차량 관리</h1>
      <div class="flex-1"></div>
      <span id="user-badge" class="text-xs text-zinc-400 hidden sm:inline"></span>
      <a href="/" class="btn btn-ghost">대시보드</a>
    </div>
  </header>

  <main class="flex-1 max-w-[1200px] w-full mx-auto px-4 py-3">
    <div class="grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_minmax(400px,480px)] gap-4">

      <section class="border border-zinc-700 rounded-lg overflow-hidden flex flex-col" style="min-height: 60vh;">
        <div class="p-3 border-b border-zinc-700 bg-zinc-800/50 flex flex-wrap gap-2 items-center">
          <input id="search-input" type="search" placeholder="차량번호 검색"
                 class="app-input flex-1 min-w-[180px]">
          <select id="filter-company" class="app-select w-44">
            <option value="">운수사(전체)</option>
          </select>
          <select id="sort-key" class="app-select w-28">
            <option value="plate">차량번호순</option>
            <option value="tonnage">톤수순</option>
            <option value="company">운수사순</option>
            <option value="updated">수정 최신순</option>
          </select>
          <button id="new-btn" class="btn btn-primary">+ 신규</button>
        </div>
        <div class="table-wrap" style="max-height: calc(100vh - 220px); border: none; border-radius: 0;">
          <table class="app-table">
            <thead>
              <tr>
                <th>차량번호</th>
                <th class="text-right">톤수</th>
                <th class="text-right">팔레트</th>
                <th>운수사</th>
                <th class="text-right">주코스</th>
                <th class="text-right">보조코스</th>
              </tr>
            </thead>
            <tbody id="list-tbody"></tbody>
          </table>
          <div id="empty-msg" class="hidden text-center text-sm text-zinc-500 py-12">
            등록된 차량이 없습니다.
          </div>
        </div>
        <div class="px-3 py-2 border-t border-zinc-700 text-xs text-zinc-400 flex items-center justify-between">
          <span id="result-count"></span>
          <span id="loading-indicator" class="hidden">불러오는 중...</span>
        </div>
      </section>

      <section class="border border-zinc-700 rounded-lg bg-zinc-800/30">
        <div class="px-4 py-3 border-b border-zinc-700 flex items-center gap-3">
          <h2 id="form-title" class="text-sm font-semibold">새 차량</h2>
          <span id="form-mode-badge" class="text-[10px] px-1.5 py-0.5 rounded bg-zinc-700 text-zinc-300">신규</span>
          <div class="flex-1"></div>
          <span id="form-meta" class="text-[11px] text-zinc-500"></span>
        </div>
        <form id="form" class="p-4 space-y-3" novalidate>
          <input type="hidden" id="f-id">
          <div>
            <label class="app-label">차량번호 *</label>
            <input id="f-plate" class="app-input" required placeholder="예: 12가3456">
            <p class="text-[10px] text-zinc-500 mt-1">차량번호는 중복될 수 없습니다.</p>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="app-label">톤수</label>
              <input id="f-tonnage-text" class="app-input" placeholder='예: "3.5톤"'>
              <p class="text-[10px] text-zinc-500 mt-1">숫자가 포함되면 자동으로 톤수 값에 반영됩니다.</p>
            </div>
            <div>
              <label class="app-label">팔레트 적재량</label>
              <input id="f-pallet" type="number" min="0" step="1" class="app-input" placeholder="예: 16">
            </div>
          </div>
          <div>
            <label class="app-label">소속 운수사</label>
            <select id="f-company" class="app-select">
              <option value="">선택 안 함</option>
            </select>
          </div>
          <div>
            <label class="app-label">비고</label>
            <textarea id="f-memo" rows="2" class="app-textarea"></textarea>
          </div>
          <div class="flex items-center gap-2 pt-2 border-t border-zinc-700">
            <button type="submit" id="btn-save" class="btn btn-primary">저장</button>
            <button type="button" id="btn-cancel" class="btn btn-ghost">취소</button>
            <div class="flex-1"></div>
            <button type="button" id="btn-delete" class="btn btn-danger hidden">삭제</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script type="module">
    import { supabase } from '/js/supabase.js';
    import { requireRole } from '/js/auth.js';
    import { toast, confirmDialog } from '/js/ui.js';

    const profile = await requireRole('editor');
    if (!profile) { /* 리다이렉트 */ }
    document.getElementById('user-badge').textContent =
      `${profile.display_name || profile.email || ''} (${profile.role})`;

    const $ = (id) => document.getElementById(id);

    const state = {
      rows: [],
      filtered: [],
      companies: [],
      companyById: new Map(),
      counts: new Map(), // vehicle_id -> { primary, secondary }
      selectedId: null,
      filters: { search: '', companyId: '' },
      sort: 'plate'
    };

    bindEvents();
    await loadAll();
    resetForm();

    // -------------------------------------------------------------------------
    async function loadAll() {
      $('loading-indicator').classList.remove('hidden');
      try {
        const [veh, co, rt] = await Promise.all([
          supabase.from('vehicles').select('*'),
          supabase.from('companies').select('id, name').order('name'),
          supabase.from('routes').select('id, primary_vehicle_id, secondary_vehicle_id')
        ]);
        if (veh.error) throw veh.error;
        state.rows = veh.data || [];
        state.companies = co.data || [];
        state.companyById = new Map(state.companies.map(c => [c.id, c]));

        const counts = new Map();
        const ensure = (id) => {
          if (!counts.has(id)) counts.set(id, { primary: 0, secondary: 0 });
          return counts.get(id);
        };
        for (const r of (rt.data || [])) {
          if (r.primary_vehicle_id)   ensure(r.primary_vehicle_id).primary++;
          if (r.secondary_vehicle_id) ensure(r.secondary_vehicle_id).secondary++;
        }
        state.counts = counts;

        const opts = '<option value="">선택 안 함</option>' +
          state.companies.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
        $('f-company').innerHTML = opts;
        const filt = '<option value="">운수사(전체)</option>' +
          state.companies.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
        const cur = $('filter-company').value;
        $('filter-company').innerHTML = filt;
        $('filter-company').value = cur;
      } catch (e) {
        toast('데이터를 불러오지 못했습니다.', 'error');
        state.rows = [];
        state.counts = new Map();
      } finally {
        $('loading-indicator').classList.add('hidden');
      }
      applyAndRender();
    }

    function applyAndRender() {
      const q = state.filters.search.toLowerCase();
      const cid = state.filters.companyId;
      state.filtered = state.rows.filter(r => {
        if (cid && r.company_id !== cid) return false;
        if (q && !((r.plate_number || '').toLowerCase().includes(q))) return false;
        return true;
      });
      switch (state.sort) {
        case 'tonnage':
          state.filtered.sort((a, b) => (a.tonnage ?? -1) - (b.tonnage ?? -1)
            || (a.plate_number || '').localeCompare(b.plate_number || '', 'ko', { numeric: true }));
          break;
        case 'company':
          state.filtered.sort((a, b) => {
            const an = state.companyById.get(a.company_id)?.name || '';
            const bn = state.companyById.get(b.company_id)?.name || '';
            return an.localeCompare(bn, 'ko')
              || (a.plate_number || '').localeCompare(b.plate_number || '', 'ko', { numeric: true });
          });
          break;
        case 'updated':
          state.filtered.sort((a, b) => String(b.updated_at || '').localeCompare(String(a.updated_at || '')));
          break;
        default:
          state.filtered.sort((a, b) =>
            (a.plate_number || '').localeCompare(b.plate_number || '', 'ko', { numeric: true }));
      }
      renderList();
    }

    function renderList() {
      const tbody = $('list-tbody');
      const empty = $('empty-msg');
      tbody.innerHTML = '';
      if (state.filtered.length === 0) {
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        const frag = document.createDocumentFragment();
        for (const r of state.filtered) {
          const c = state.counts.get(r.id) || { primary: 0, secondary: 0 };
          const co = state.companyById.get(r.company_id);
          const tr = document.createElement('tr');
          tr.dataset.id = r.id;
          if (r.id === state.selectedId) tr.classList.add('selected');
          tr.classList.add('cursor-pointer');
          tr.innerHTML = `
            <td>${escapeHtml(r.plate_number || '')}</td>
            <td class="text-right">${r.tonnage != null ? r.tonnage + 't' : ''}</td>
            <td class="text-right">${r.pallet_capacity ?? ''}</td>
            <td>${escapeHtml(co?.name || '')}</td>
            <td class="text-right">${c.primary}</td>
            <td class="text-right">${c.secondary}</td>
          `;
          tr.addEventListener('click', () => selectRow(r.id));
          frag.appendChild(tr);
        }
        tbody.appendChild(frag);
      }
      $('result-count').textContent =
        state.rows.length === 0 ? '데이터 없음'
        : (state.filtered.length === state.rows.length
            ? `총 ${state.rows.length}건`
            : `총 ${state.filtered.length}건 (전체 ${state.rows.length}건 중)`);
    }

    function selectRow(id) {
      state.selectedId = id;
      renderList();
      const r = state.rows.find(x => x.id === id);
      if (r) rowToForm(r);
    }
    function resetForm() { state.selectedId = null; rowToForm(null); }

    function rowToForm(r) {
      $('f-id').value           = r?.id || '';
      $('f-plate').value        = r?.plate_number || '';
      $('f-tonnage-text').value = formatTonnage(r?.tonnage);
      $('f-pallet').value       = r?.pallet_capacity ?? '';
      $('f-company').value      = r?.company_id || '';
      $('f-memo').value         = r?.memo || '';
      const isEdit = !!r?.id;
      $('form-title').textContent = isEdit ? (r.plate_number || '(번호 없음)') : '새 차량';
      $('form-mode-badge').textContent = isEdit ? '편집' : '신규';
      $('form-meta').textContent = isEdit && r.updated_at
        ? `최종수정: ${new Date(r.updated_at).toLocaleString('ko-KR')}` : '';
      $('btn-delete').classList.toggle('hidden', !isEdit);
    }

    function bindEvents() {
      $('search-input').addEventListener('input', debounce(() => {
        state.filters.search = $('search-input').value.trim();
        applyAndRender();
      }, 200));
      $('filter-company').addEventListener('change', () => {
        state.filters.companyId = $('filter-company').value;
        applyAndRender();
      });
      $('sort-key').addEventListener('change', () => {
        state.sort = $('sort-key').value;
        applyAndRender();
      });
      $('new-btn').addEventListener('click', () => {
        state.selectedId = null; renderList(); resetForm(); $('f-plate').focus();
      });
      $('btn-cancel').addEventListener('click', () => {
        if (state.selectedId) {
          const r = state.rows.find(x => x.id === state.selectedId);
          if (r) rowToForm(r);
        } else resetForm();
      });
      $('form').addEventListener('submit', async (e) => { e.preventDefault(); await save(); });
      $('btn-delete').addEventListener('click', remove);

      // 톤수 입력값에서 숫자만 정규화 (예: "3.5톤" → 3.5)
      $('f-tonnage-text').addEventListener('blur', () => {
        const v = $('f-tonnage-text').value.trim();
        if (!v) return;
        const n = parseTonnage(v);
        if (n != null) $('f-tonnage-text').value = formatTonnage(n);
      });
    }

    async function save() {
      const plate = $('f-plate').value.trim();
      if (!plate) { toast('차량번호는 필수입니다.', 'warn'); $('f-plate').focus(); return; }

      const tonnage = parseTonnage($('f-tonnage-text').value.trim());
      const pallet = $('f-pallet').value === '' ? null : Math.max(0, parseInt($('f-pallet').value, 10));

      if (tonnage != null && !(tonnage > 0)) {
        toast('톤수는 0보다 커야 합니다.', 'warn'); return;
      }

      const payload = {
        ...(($('f-id').value) ? { id: $('f-id').value } : {}),
        plate_number: plate,
        tonnage,
        pallet_capacity: Number.isFinite(pallet) ? pallet : null,
        company_id: emptyToNull($('f-company').value),
        memo:       emptyToNull($('f-memo').value.trim())
      };

      $('btn-save').disabled = true;
      try {
        const { data, error } = await supabase
          .from('vehicles').upsert(payload, { onConflict: 'id' })
          .select().single();
        if (error) {
          if (error.code === '23505') toast('이미 사용 중인 차량번호입니다.', 'error');
          else toast(`저장 실패: ${error.message}`, 'error');
          return;
        }
        toast(payload.id ? '수정되었습니다.' : '추가되었습니다.', 'success');
        await loadAll();
        selectRow(data.id);
      } catch {
        toast('저장 중 오류가 발생했습니다.', 'error');
      } finally {
        $('btn-save').disabled = false;
      }
    }

    async function remove() {
      const id = $('f-id').value;
      if (!id) return;
      const r = state.rows.find(x => x.id === id);
      const c = state.counts.get(id) || { primary: 0, secondary: 0 };

      let msg = `"${r?.plate_number || '이 차량'}"을 삭제할까요?`;
      const total = c.primary + c.secondary;
      if (total > 0) {
        msg += `\n\n⚠ 이 차량이 배정된 코스: 주차량 ${c.primary}건, 보조차량 ${c.secondary}건.\n` +
               `삭제하면 해당 코스의 차량 항목은 비워집니다 (NULL 처리).`;
      }
      const ok = await confirmDialog(msg, { okText: '삭제', cancelText: '취소', danger: true });
      if (!ok) return;

      try {
        const { error } = await supabase.from('vehicles').delete().eq('id', id);
        if (error) { toast(`삭제 실패: ${error.message}`, 'error'); return; }
        toast('삭제되었습니다.', 'success');
        await loadAll();
        resetForm();
      } catch {
        toast('삭제 중 오류가 발생했습니다.', 'error');
      }
    }

    // -------------------------------------------------------------------------
    // 톤수 텍스트 입출력 헬퍼
    //   "3.5톤", "3.5t", "3.5", "1톤" → numeric 3.5 / 1
    //   numeric 3.5 → "3.5톤" (표시)
    // -------------------------------------------------------------------------
    function parseTonnage(text) {
      if (!text) return null;
      const m = String(text).match(/(\d+(?:\.\d+)?)/);
      if (!m) return null;
      const n = parseFloat(m[1]);
      if (!Number.isFinite(n) || n <= 0) return null;
      // numeric(5,2) 범위 보호
      if (n > 999.99) return null;
      return Math.round(n * 100) / 100;
    }
    function formatTonnage(n) {
      if (n == null) return '';
      // 정수면 정수로, 아니면 소수 표기
      const num = Number(n);
      const s = Number.isInteger(num) ? String(num) : num.toString();
      return `${s}톤`;
    }

    function emptyToNull(v) { return v === '' || v == null ? null : v; }
    function escapeHtml(s) {
      return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
        .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function debounce(fn, w) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), w); }; }
  </script>
</body>
</html>
