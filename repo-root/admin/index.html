<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>관리 허브 · 코스표 관리 시스템</title>
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen flex flex-col">

  <!-- 헤더 -->
  <header class="border-b border-zinc-800">
    <div class="max-w-[1200px] mx-auto px-4 py-3 flex items-center gap-4">
      <div class="flex items-center gap-2 min-w-0">
        <div class="w-8 h-8 rounded-md bg-emerald-600/20 border border-emerald-600/40 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-emerald-400"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 7h11v8H3zM14 10h4l3 3v2h-7zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM17.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
          </svg>
        </div>
        <h1 class="text-base font-semibold">관리 허브</h1>
      </div>
      <div class="flex-1"></div>
      <span id="user-badge" class="text-xs text-zinc-400 hidden sm:inline"></span>
      <a href="/" class="btn btn-ghost">대시보드</a>
      <button id="logout-btn" class="btn btn-ghost">로그아웃</button>
    </div>
  </header>

  <!-- 본문 -->
  <main class="flex-1 max-w-[1200px] w-full mx-auto px-4 py-8">
    <p class="text-sm text-zinc-400 mb-6">관리할 항목을 선택하세요.</p>
    <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </main>

  <script type="module">
    import { requireRole, signOut } from '/js/auth.js';

    const profile = await requireRole('editor');
    if (!profile) { /* 리다이렉트 됨 */ }

    document.getElementById('user-badge').textContent =
      `${profile.display_name || profile.email || ''} (${profile.role})`;
    document.getElementById('logout-btn').addEventListener('click', signOut);

    // 메뉴 정의
    const isAdmin = profile.role === 'admin';
    const menus = [
      { href: '/admin/routes.html',          title: '코스 관리',      desc: '코스와 정거장(운행시간) 편집',
        icon: iconRoute(), color: 'emerald' },
      { href: '/admin/delivery-points.html', title: '납품처 관리',    desc: '납품처 마스터(주소·진입조건·마감시간)',
        icon: iconStore(), color: 'sky' },
      { href: '/admin/drivers.html',         title: '기사 관리',      desc: '기사 명부와 연락처',
        icon: iconUser(),  color: 'amber' },
      { href: '/admin/vehicles.html',        title: '차량 관리',      desc: '차량번호·톤수·팔레트 적재량',
        icon: iconTruck(), color: 'violet' },
      { href: '/admin/companies.html',       title: '운수사 관리',    desc: '운수사 정보',
        icon: iconBuilding(), color: 'rose' },
      { href: '/admin/import.html', icon: '📥', title: 'CSV 일괄 가져오기', desc: '엑셀 코스표를 한 번에 업로드', color: 'amber', adminOnly: true },
      ...(isAdmin ? [
        { href: '/admin/users.html',     title: '사용자 관리', desc: '계정·권한·활성 상태 (관리자 전용)',
          icon: iconShield(), color: 'cyan',  adminOnly: true },
        { href: '/admin/audit-log.html', title: '변경 이력',   desc: '데이터 변경 로그 (관리자 전용)',
          icon: iconLog(),    color: 'zinc',  adminOnly: true }
      ] : [])
    ];

    const COLOR = {
      emerald: { bg: 'bg-emerald-600/10', border: 'border-emerald-600/30', icon: 'text-emerald-400' },
      sky:     { bg: 'bg-sky-600/10',     border: 'border-sky-600/30',     icon: 'text-sky-400' },
      amber:   { bg: 'bg-amber-600/10',   border: 'border-amber-600/30',   icon: 'text-amber-400' },
      violet:  { bg: 'bg-violet-600/10',  border: 'border-violet-600/30',  icon: 'text-violet-400' },
      rose:    { bg: 'bg-rose-600/10',    border: 'border-rose-600/30',    icon: 'text-rose-400' },
      cyan:    { bg: 'bg-cyan-600/10',    border: 'border-cyan-600/30',    icon: 'text-cyan-400' },
      zinc:    { bg: 'bg-zinc-700/30',    border: 'border-zinc-600/40',    icon: 'text-zinc-300' }
    };

    const grid = document.getElementById('menu-grid');
    grid.innerHTML = menus.map(m => {
      const c = COLOR[m.color] || COLOR.zinc;
      return `
        <a href="${m.href}"
           class="group block rounded-lg border border-zinc-700 bg-zinc-800/40 hover:bg-zinc-800
                  hover:border-zinc-600 transition p-4">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-md ${c.bg} ${c.border} border flex items-center justify-center shrink-0">
              <span class="${c.icon}">${m.icon}</span>
            </div>
            <div class="min-w-0">
              <div class="flex items-center gap-2">
                <h3 class="text-sm font-semibold">${m.title}</h3>
                ${m.adminOnly ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-zinc-700 text-zinc-300">관리자</span>' : ''}
              </div>
              <p class="text-xs text-zinc-400 mt-0.5">${m.desc}</p>
            </div>
          </div>
        </a>
      `;
    }).join('');

    // ----- 인라인 SVG 아이콘들 -----
    function iconRoute() {
      return `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 19a3 3 0 100-6h12a3 3 0 100-6M6 5v0M18 19v0"/>
      </svg>`;
    }
    function iconStore() {
      return `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9l1-4h16l1 4M3 9v11h18V9M3 9h18M9 13h6"/>
      </svg>`;
    }
    function iconUser() {
      return `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 14a4 4 0 10-8 0M5 21a7 7 0 0114 0M12 11a3 3 0 100-6 3 3 0 000 6z"/>
      </svg>`;
    }
    function iconTruck() {
      return `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 7h11v8H3zM14 10h4l3 3v2h-7zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM17.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
      </svg>`;
    }
    function iconBuilding() {
      return `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 21V5a2 2 0 012-2h8a2 2 0 012 2v16M4 21h16M16 9h2a2 2 0 012 2v10M9 8h2M9 12h2M9 16h2"/>
      </svg>`;
    }
    function iconShield() {
      return `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6l8-3z"/>
      </svg>`;
    }
    function iconLog() {
      return `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5h10M9 12h10M9 19h10M5 5h.01M5 12h.01M5 19h.01"/>
      </svg>`;
    }
  </script>
</body>
</html>
