<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>코스 관리 · 코스표 관리 시스템</title>
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen flex flex-col">

  <!-- 헤더 -->
  <header class="border-b border-zinc-800 sticky top-0 z-30 bg-zinc-900/95 backdrop-blur">
    <div class="max-w-[1400px] mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/admin/" class="text-xs text-zinc-400 hover:text-zinc-100">← 관리 허브</a>
      <h1 class="text-base font-semibold">코스 관리</h1>
      <div class="flex-1"></div>
      <span id="user-badge" class="text-xs text-zinc-400 hidden sm:inline"></span>
      <a href="/" class="btn btn-ghost">대시보드</a>
    </div>
  </header>

  <main class="flex-1 max-w-[1400px] w-full mx-auto px-4 py-3">
    <!-- 툴바 -->
    <div class="flex flex-wrap items-center gap-2 mb-3">
      <input id="search-input" type="search" placeholder="코스명/호차/기사/차량번호 검색"
             class="app-input flex-1 min-w-[220px]">
      <select id="filter-company" class="app-select w-44">
        <option value="">운수사(전체)</option>
      </select>
      <button id="new-btn" class="btn btn-primary">+ 새 코스</button>
    </div>

    <!-- 목록 -->
    <div class="table-wrap" style="max-height: calc(100vh - 200px);">
      <table class="app-table">
        <thead>
          <tr>
            <th>운수사</th>
            <th>호차</th>
            <th>코스명</th>
            <th>주기사</th>
            <th>보조기사</th>
            <th>주차량</th>
            <th class="text-right">정거장</th>
            <th>상태</th>
            <th class="text-right">작업</th>
          </tr>
        </thead>
        <tbody id="route-tbody"></tbody>
      </table>
      <div id="empty-msg" class="hidden text-center text-sm text-zinc-500 py-12">
        조건에 맞는 코스가 없습니다.
      </div>
    </div>

    <div class="px-1 py-2 text-xs text-zinc-400 flex items-center justify-between">
      <span id="result-count"></span>
      <span id="loading-indicator" class="hidden">불러오는 중...</span>
    </div>
  </main>

  <script type="module">
    import { supabase } from '/js/supabase.js';
    import { requireRole } from '/js/auth.js';
    import { toast, openModal, closeModal, confirmDialog } from '/js/ui.js';

    // -------------------------------------------------------------------------
    // 권한
    // -------------------------------------------------------------------------
    const profile = await requireRole('editor');
    if (!profile) { /* 리다이렉트 */ }
    document.getElementById('user-badge').textContent =
      `${profile.display_name || profile.email || ''} (${profile.role})`;

    // -------------------------------------------------------------------------
    // 상태
    // -------------------------------------------------------------------------
    const state = {
      routes: [],            // 코스 본체
      stopCounts: new Map(), // route_id -> 정거장 개수
      companies: [],
      drivers: [],
      vehicles: [],
      filtered: [],
      filters: { search: '', companyId: '' }
    };

    const $ = (id) => document.getElementById(id);

    // -------------------------------------------------------------------------
    // 부트
    // -------------------------------------------------------------------------
    bindEvents();
    await Promise.all([loadMasters(), loadRoutes()]);
    applyAndRender();

    // -------------------------------------------------------------------------
    // 데이터 로드
    // -------------------------------------------------------------------------
    async function loadMasters() {
      try {
        const [c, d, v] = await Promise.all([
          supabase.from('companies').select('id, name').order('name'),
          supabase.from('drivers').select('id, name, phone, company_id').order('name'),
          supabase.from('vehicles').select('id, plate_number, tonnage, company_id').order('plate_number')
        ]);
        if (c.error || d.error || v.error) throw (c.error || d.error || v.error);
        state.companies = c.data || [];
        state.drivers   = d.data || [];
        state.vehicles  = v.data || [];

        // 필터 셀렉트
        $('filter-company').innerHTML =
          '<option value="">운수사(전체)</option>' +
          state.companies.map(co => `<option value="${co.id}">${escapeHtml(co.name)}</option>`).join('');
      } catch (e) {
        toast('마스터 데이터를 불러오지 못했습니다.', 'error');
      }
    }

    async function loadRoutes() {
      $('loading-indicator').classList.remove('hidden');
      try {
        const { data, error } = await supabase
          .from('routes')
          .select('*');
        if (error) throw error;
        state.routes = data || [];

        // 정거장 개수 (route_id 별)
        const { data: counts, error: cErr } = await supabase
          .from('route_stops')
          .select('route_id');
        if (cErr) throw cErr;
        const map = new Map();
        for (const row of counts || []) {
          map.set(row.route_id, (map.get(row.route_id) || 0) + 1);
        }
        state.stopCounts = map;
      } catch (e) {
        toast('코스 목록을 불러오지 못했습니다.', 'error');
        state.routes = [];
        state.stopCounts = new Map();
      } finally {
        $('loading-indicator').classList.add('hidden');
      }
    }

    // -------------------------------------------------------------------------
    // 필터/렌더
    // -------------------------------------------------------------------------
    function applyAndRender() {
      const f = state.filters;
      const q = f.search.toLowerCase();

      const drvById = new Map(state.drivers.map(d => [d.id, d]));
      const vehById = new Map(state.vehicles.map(v => [v.id, v]));
      const coById  = new Map(state.companies.map(c => [c.id, c]));

      state.filtered = state.routes.filter(r => {
        if (f.companyId && r.company_id !== f.companyId) return false;
        if (q) {
          const pdrv = drvById.get(r.primary_driver_id);
          const sdrv = drvById.get(r.secondary_driver_id);
          const pveh = vehById.get(r.primary_vehicle_id);
          const sveh = vehById.get(r.secondary_vehicle_id);
          const hay = [
            r.name, r.car_number,
            pdrv?.name, sdrv?.name,
            pveh?.plate_number, sveh?.plate_number
          ].filter(Boolean).join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      state.filtered.sort((a, b) => {
        const ca = coById.get(a.company_id)?.name || '';
        const cb = coById.get(b.company_id)?.name || '';
        return ca.localeCompare(cb, 'ko') ||
               String(a.car_number || '').localeCompare(String(b.car_number || ''), 'ko', { numeric: true }) ||
               String(a.name || '').localeCompare(String(b.name || ''), 'ko');
      });

      renderTable();
      $('result-count').textContent =
        state.routes.length === 0 ? '코스 없음'
        : (state.filtered.length === state.routes.length
            ? `총 ${state.routes.length}건`
            : `총 ${state.filtered.length}건 (전체 ${state.routes.length}건 중)`);
    }

    function renderTable() {
      const tbody = $('route-tbody');
      const empty = $('empty-msg');
      tbody.innerHTML = '';

      if (state.filtered.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      const drvById = new Map(state.drivers.map(d => [d.id, d]));
      const vehById = new Map(state.vehicles.map(v => [v.id, v]));
      const coById  = new Map(state.companies.map(c => [c.id, c]));

      const frag = document.createDocumentFragment();
      for (const r of state.filtered) {
        const tr = document.createElement('tr');
        const stops = state.stopCounts.get(r.id) || 0;
        tr.innerHTML = `
          <td>${escapeHtml(coById.get(r.company_id)?.name || '')}</td>
          <td>${escapeHtml(r.car_number || '')}</td>
          <td>${escapeHtml(r.name || '')}</td>
          <td>${escapeHtml(drvById.get(r.primary_driver_id)?.name || '')}</td>
          <td class="text-zinc-400">${escapeHtml(drvById.get(r.secondary_driver_id)?.name || '')}</td>
          <td>${escapeHtml(vehById.get(r.primary_vehicle_id)?.plate_number || '')}</td>
          <td class="text-right">${stops}</td>
          <td>${r.active === false ? '<span class="text-rose-400 text-xs">비활성</span>' : '<span class="text-emerald-400 text-xs">활성</span>'}</td>
          <td class="text-right whitespace-nowrap">
            <a class="btn btn-ghost text-xs" href="/admin/route-edit.html?id=${encodeURIComponent(r.id)}">정거장 ${stops}</a>
            <button class="btn btn-ghost text-xs" data-act="edit"   data-id="${r.id}">편집</button>
            <button class="btn btn-ghost text-xs text-rose-400" data-act="delete" data-id="${r.id}">삭제</button>
          </td>
        `;
        frag.appendChild(tr);
      }
      tbody.appendChild(frag);

      tbody.querySelectorAll('button[data-act]').forEach(b => {
        b.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = b.dataset.id;
          if (b.dataset.act === 'edit')   openRouteForm(state.routes.find(x => x.id === id));
          if (b.dataset.act === 'delete') deleteRoute(id);
        });
      });
    }

    // -------------------------------------------------------------------------
    // 이벤트
    // -------------------------------------------------------------------------
    function bindEvents() {
      $('search-input').addEventListener('input', debounce(() => {
        state.filters.search = $('search-input').value.trim();
        applyAndRender();
      }, 200));
      $('filter-company').addEventListener('change', () => {
        state.filters.companyId = $('filter-company').value;
        applyAndRender();
      });
      $('new-btn').addEventListener('click', () => openRouteForm(null));
    }

    // -------------------------------------------------------------------------
    // 코스 신규/편집 모달
    // -------------------------------------------------------------------------
    function openRouteForm(route) {
      const isEdit = !!route;
      const wrap = document.createElement('div');
      wrap.className = 'p-5';

      wrap.innerHTML = `
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-base font-semibold">${isEdit ? '코스 편집' : '새 코스'}</h2>
          <button data-x class="btn btn-ghost text-xs">닫기</button>
        </div>
        <form id="route-form" class="space-y-3" novalidate>
          <div>
            <label class="app-label">코스명 *</label>
            <input id="r-name" class="app-input" required>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="app-label">호차</label>
              <input id="r-car" class="app-input" placeholder="예: 대-14호차">
            </div>
            <div>
              <label class="app-label">운수사</label>
              <select id="r-company" class="app-select">
                <option value="">선택 안 함</option>
                ${state.companies.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="app-label">주기사</label>
              <select id="r-driver" class="app-select"></select>
            </div>
            <div>
              <label class="app-label">주차량</label>
              <select id="r-vehicle" class="app-select"></select>
            </div>
            <div>
              <label class="app-label">보조기사</label>
              <select id="r-driver2" class="app-select"></select>
            </div>
            <div>
              <label class="app-label">보조차량</label>
              <select id="r-vehicle2" class="app-select"></select>
            </div>
          </div>
          <label class="cb"><input type="checkbox" id="r-active" checked> 활성</label>
          <div class="flex items-center gap-2 pt-2 border-t border-zinc-700">
            <button type="submit" class="btn btn-primary">저장</button>
            <button type="button" data-x class="btn btn-ghost">취소</button>
          </div>
        </form>
      `;

      openModal(wrap, { width: 'lg' });

      // 닫기
      wrap.querySelectorAll('[data-x]').forEach(b => b.addEventListener('click', closeModal));

      // 초기값
      if (isEdit) {
        wrap.querySelector('#r-name').value    = route.name || '';
        wrap.querySelector('#r-car').value     = route.car_number || '';
        wrap.querySelector('#r-company').value = route.company_id || '';
        wrap.querySelector('#r-active').checked = route.active !== false;
      }

      // 운수사 변경 → 기사/차량 셀렉트 필터
      const drvSel  = wrap.querySelector('#r-driver');
      const drvSel2 = wrap.querySelector('#r-driver2');
      const vehSel  = wrap.querySelector('#r-vehicle');
      const vehSel2 = wrap.querySelector('#r-vehicle2');

      function refreshDropdowns(companyId, keep) {
        const drvs = state.drivers.filter(d => !companyId || d.company_id === companyId);
        const vehs = state.vehicles.filter(v => !companyId || v.company_id === companyId);
        drvSel.innerHTML  = optionListDriver(drvs);
        drvSel2.innerHTML = '<option value="">없음</option>' + optionListDriver(drvs);
        vehSel.innerHTML  = optionListVehicle(vehs);
        vehSel2.innerHTML = '<option value="">없음</option>' + optionListVehicle(vehs);

        if (keep) {
          if (route?.primary_driver_id    && drvs.find(x => x.id === route.primary_driver_id))    drvSel.value  = route.primary_driver_id;
          if (route?.secondary_driver_id  && drvs.find(x => x.id === route.secondary_driver_id))  drvSel2.value = route.secondary_driver_id;
          if (route?.primary_vehicle_id   && vehs.find(x => x.id === route.primary_vehicle_id))   vehSel.value  = route.primary_vehicle_id;
          if (route?.secondary_vehicle_id && vehs.find(x => x.id === route.secondary_vehicle_id)) vehSel2.value = route.secondary_vehicle_id;
        }
      }
      refreshDropdowns(route?.company_id || '', true);

      wrap.querySelector('#r-company').addEventListener('change', (e) => {
        refreshDropdowns(e.target.value, false);
      });

      // 저장
      wrap.querySelector('#route-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = wrap.querySelector('#r-name').value.trim();
        if (!name) {
          toast('코스명은 필수입니다.', 'warn');
          return;
        }
        const payload = {
          name,
          car_number: nullIfEmpty(wrap.querySelector('#r-car').value.trim()),
          company_id: nullIfEmpty(wrap.querySelector('#r-company').value),
          primary_driver_id:    nullIfEmpty(drvSel.value),
          primary_vehicle_id:   nullIfEmpty(vehSel.value),
          secondary_driver_id:  nullIfEmpty(drvSel2.value),
          secondary_vehicle_id: nullIfEmpty(vehSel2.value),
          active: wrap.querySelector('#r-active').checked
        };
        if (isEdit) payload.id = route.id;

        try {
          const { error } = await supabase
            .from('routes')
            .upsert(payload, { onConflict: 'id' });
          if (error) {
            toast(`저장 실패: ${error.message}`, 'error');
            return;
          }
          toast(isEdit ? '수정되었습니다.' : '추가되었습니다.', 'success');
          closeModal();
          await loadRoutes();
          applyAndRender();
        } catch {
          toast('저장 중 오류가 발생했습니다.', 'error');
        }
      });

      function optionListDriver(arr) {
        return arr.map(d => `<option value="${d.id}">${escapeHtml(d.name)}${d.phone ? ' · ' + escapeHtml(d.phone) : ''}</option>`).join('');
      }
      function optionListVehicle(arr) {
        return arr.map(v => `<option value="${v.id}">${escapeHtml(v.plate_number)}${v.tonnage ? ' · ' + v.tonnage + 't' : ''}</option>`).join('');
      }
    }

    // -------------------------------------------------------------------------
    // 코스 삭제
    // -------------------------------------------------------------------------
    async function deleteRoute(id) {
      const r = state.routes.find(x => x.id === id);
      if (!r) return;
      const stops = state.stopCounts.get(id) || 0;

      let msg = `"${r.name}" 코스를 삭제할까요?`;
      if (stops > 0) {
        msg += `\n\n⚠ 이 코스에는 정거장 ${stops}개가 등록되어 있습니다.\n` +
               `코스를 삭제하면 정거장도 함께 삭제됩니다 (되돌릴 수 없음).`;
      }
      const ok = await confirmDialog(msg, { okText: '삭제', cancelText: '취소', danger: true });
      if (!ok) return;

      try {
        const { error } = await supabase.from('routes').delete().eq('id', id);
        if (error) {
          toast(`삭제 실패: ${error.message}`, 'error');
          return;
        }
        toast('삭제되었습니다.', 'success');
        await loadRoutes();
        applyAndRender();
      } catch {
        toast('삭제 중 오류가 발생했습니다.', 'error');
      }
    }

    // -------------------------------------------------------------------------
    // 헬퍼
    // -------------------------------------------------------------------------
    function nullIfEmpty(v) { return v === '' || v == null ? null : v; }
    function escapeHtml(s) {
      return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
        .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function debounce(fn, wait) {
      let t = null;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
    }
  </script>
</body>
</html>
