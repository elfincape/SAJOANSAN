<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>코스표 내려받기 · 관리자</title>
<link rel="stylesheet" href="/css/common.css" />
<script src="https://cdn.tailwindcss.com"></script>
<!-- CSV 파서 -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<!-- XLSX 파서 (엑셀 내보내기용) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen">

<header class="border-b border-zinc-800 bg-zinc-900/80 backdrop-blur sticky top-0 z-30">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
    <a href="/admin/index.html" class="text-zinc-400 hover:text-zinc-100 text-sm">← 관리자 홈</a>
    <h1 class="text-lg font-semibold">📤 코스표 내려받기</h1>
    <span class="ml-auto text-xs text-zinc-400" id="user-badge"></span>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

  <!-- 안내 -->
  <section class="bg-zinc-800/60 border border-zinc-700 rounded-lg p-4 text-sm leading-relaxed">
    <h2 class="font-semibold text-zinc-100 mb-2">사용 방법</h2>
    <ol class="list-decimal list-inside space-y-1 text-zinc-300">
      <li>아래 옵션에서 <strong>파일 형식</strong>(CSV / XLSX)과 <strong>필터 조건</strong>을 선택합니다.</li>
      <li><strong>"미리보기 새로고침"</strong> 버튼으로 데이터 건수와 샘플을 확인합니다.</li>
      <li><strong>"내려받기"</strong> 버튼을 누르면 파일이 저장됩니다.</li>
    </ol>
    <p class="mt-2 text-amber-300/90 text-xs">
      ⚠️ 출력 형식은 <code>admin/import.html</code> 의 입력 형식과 동일합니다. 내려받은 파일을 수정 후 다시 import 페이지로 업로드하면 변경사항이 반영됩니다.
    </p>
  </section>

  <!-- 옵션 -->
  <section class="bg-zinc-800/40 border border-zinc-700 rounded-lg p-4">
    <h2 class="font-semibold mb-3">출력 옵션</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
      <label class="flex flex-col gap-1 text-sm">
        <span class="text-zinc-400">파일 형식</span>
        <select id="opt-format" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5">
          <option value="csv">CSV (UTF-8, BOM 포함)</option>
          <option value="xlsx">XLSX (엑셀)</option>
        </select>
      </label>

      <label class="flex flex-col gap-1 text-sm">
        <span class="text-zinc-400">운수사 필터</span>
        <select id="opt-company" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5">
          <option value="">— 전체 —</option>
        </select>
      </label>

      <label class="flex flex-col gap-1 text-sm">
        <span class="text-zinc-400">코스 활성 상태</span>
        <select id="opt-active" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5">
          <option value="all">전체</option>
          <option value="active" selected>활성 코스만</option>
          <option value="inactive">비활성 코스만</option>
        </select>
      </label>

      <label class="flex flex-col gap-1 text-sm">
        <span class="text-zinc-400">시간 표기</span>
        <select id="opt-time-format" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5">
          <option value="ampm">12시간 (10:00 PM)</option>
          <option value="24h">24시간 (22:00)</option>
        </select>
      </label>

      <label class="flex flex-col gap-1 text-sm md:col-span-2 lg:col-span-3">
        <span class="text-zinc-400">파일명</span>
        <input id="opt-filename" type="text" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5"
               placeholder="코스표_YYYYMMDD" />
      </label>
    </div>

    <div class="mt-4 flex flex-wrap gap-2">
      <button id="btn-refresh" class="px-4 py-2 bg-zinc-700 hover:bg-zinc-600 rounded text-sm">
        🔄 미리보기 새로고침
      </button>
      <button id="btn-download" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 rounded font-semibold text-sm" disabled>
        📥 내려받기
      </button>
    </div>
  </section>

  <!-- 미리보기 -->
  <section class="bg-zinc-800/40 border border-zinc-700 rounded-lg p-4">
    <h2 class="font-semibold mb-3">미리보기</h2>
    <div id="summary" class="text-sm text-zinc-300 mb-3">데이터를 불러오려면 "미리보기 새로고침"을 누르세요.</div>
    <div class="overflow-auto max-h-96 bg-zinc-900 rounded">
      <table class="text-xs w-full" id="preview-table">
        <thead class="bg-zinc-800 sticky top-0"></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

</main>

<script type="module">
  import { supabase } from '/js/supabase.js';
  import { requireRole, getCurrentProfile } from '/js/auth.js';
  import { bizMinToDisplay } from '/js/time.js';
  import { toast } from '/js/ui.js';

  /* ─────────── 인증 가드 ─────────── */
  await requireRole('editor'); // editor 이상 다운로드 가능
  const profile = await getCurrentProfile();
  document.getElementById('user-badge').textContent =
    `${profile?.display_name ?? ''} (${profile?.role ?? ''})`;

  /* ─────────── 출력 헤더 (import.html 과 동일 순서) ─────────── */
  const HEADERS = [
    '호차','운수사','코스명','톤수','차량번호','운전자명','연락처',
    '입차시간','하차시작','하차종료','납품마감',
    '코드','납품처명',
    '1톤이하','3.5톤이하','5톤이상','무인야적납',
    '대면','검수','무인',
    '보안키','열쇠','없음',
    '창고','탑차','야적',
    '주소','비고',
  ];

  /* ─────────── 상태 ─────────── */
  const state = { rows: [], companies: [] };

  /* ─────────── 운수사 목록 로드 ─────────── */
  async function loadCompanies() {
    const { data, error } = await supabase
      .from('companies').select('id, name').order('name');
    if (error) { toast(`운수사 로드 실패: ${error.message}`, 'error'); return; }
    state.companies = data || [];
    const sel = document.getElementById('opt-company');
    state.companies.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  }

  /* ─────────── 시간 포맷 ─────────── */
  function fmtTime(min, mode) {
    if (min == null) return '';
    let s;
    try { s = bizMinToDisplay(min); } catch { return ''; }
    // s: "HH:MM" (24h, 04:00 ~ 27:59 표기 가능)
    if (mode === '24h') return s;
    // 12h AM/PM 변환
    const [h, m] = s.split(':').map(Number);
    const realH = h >= 24 ? h - 24 : h;
    const ampm = realH < 12 ? 'AM' : 'PM';
    let h12 = realH % 12; if (h12 === 0) h12 = 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }
  function fmtDeadline(min, text, mode) {
    // 마감 시간은 텍스트 원문이 우선 (예: "X", "10시이후", "15:00~16:00")
    if (text && text.trim() !== '') {
      const t = text.trim();
      // datetime 형식("1900-01-01 22:00:00") 정리
      const m = t.match(/(\d{1,2}):(\d{2})(?::\d{2})?$/);
      if (/^\d{4}-\d{2}-\d{2}/.test(t) && m) {
        return mode === '24h' ? `${m[1].padStart(2,'0')}:${m[2]}` : convertToAmPm(`${m[1]}:${m[2]}`);
      }
      // "X", "미운행", "10시이후", "15:00~16:00" 등은 그대로
      return t;
    }
    return fmtTime(min, mode);
  }
  function convertToAmPm(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    const realH = h >= 24 ? h - 24 : h;
    const ampm = realH < 12 ? 'AM' : 'PM';
    let h12 = realH % 12; if (h12 === 0) h12 = 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  /* ─────────── 톤수 포맷 ("3.5" → "3.5톤") ─────────── */
  function fmtTonnage(n) {
    if (n == null || n === '') return '';
    return `${n}톤`;
  }

  /* ─────────── 진입조건/방식/장소 텍스트 → 체크 변환 ─────────── */
  function ck(b) { return b ? 'O' : ''; }
  function eq(v, target) { return v === target ? 'O' : ''; }

  /* ─────────── 데이터 로드 + 행 변환 ─────────── */
  async function loadData() {
    document.getElementById('summary').textContent = '불러오는 중…';
    document.getElementById('btn-download').disabled = true;

    const companyId = document.getElementById('opt-company').value || null;
    const activeMode = document.getElementById('opt-active').value;

    // route_stops + 조인
    let query = supabase
      .from('route_stops')
      .select(`
        stop_order,
        arrival_text, arrival_business_min,
        unloading_start_text, unloading_start_business_min,
        unloading_end_text, unloading_end_business_min,
        deadline_text, deadline_business_min,
        memo,
        override_delivery_method, override_access_method, override_delivery_location,
        delivery_points (
          code, name, address,
          allow_under_1ton, allow_under_3_5ton, allow_over_5ton, allow_unmanned_yard,
          delivery_method, access_method, delivery_location,
          deadline_text, deadline_business_min
        ),
        routes!inner (
          id, name, car_number, active,
          companies ( id, name ),
          drivers:primary_driver_id ( name, phone, contact ),
          vehicles:primary_vehicle_id ( plate_number, tonnage )
        )
      `)
      .order('stop_order', { ascending: true });

    if (companyId) query = query.eq('routes.company_id', companyId);
    if (activeMode === 'active')   query = query.eq('routes.active', true);
    if (activeMode === 'inactive') query = query.eq('routes.active', false);

    const { data, error } = await query;
    if (error) {
      toast(`데이터 로드 실패: ${error.message}`, 'error');
      document.getElementById('summary').textContent = `오류: ${error.message}`;
      return;
    }

    state.rows = data || [];
    renderPreview();
    document.getElementById('btn-download').disabled = state.rows.length === 0;
  }

  /* ─────────── 행 → CSV 객체 변환 ─────────── */
  function rowToFlat(stop) {
    const r  = stop.routes || {};
    const c  = r.companies || {};
    const dr = r.drivers || {};
    const v  = r.vehicles || {};
    const p  = stop.delivery_points || {};
    const tm = document.getElementById('opt-time-format').value;

    // 오버라이드 우선
    const dm = stop.override_delivery_method   ?? p.delivery_method;
    const am = stop.override_access_method     ?? p.access_method;
    const dl = stop.override_delivery_location ?? p.delivery_location;

    // 마감: 정거장 우선, 없으면 납품처
    const dlText = stop.deadline_text ?? p.deadline_text;
    const dlMin  = stop.deadline_business_min ?? p.deadline_business_min;

    return {
      '호차':       r.car_number ?? '',
      '운수사':     c.name ?? '',
      '코스명':     r.name ?? '',
      '톤수':       fmtTonnage(v.tonnage),
      '차량번호':   v.plate_number ?? '',
      '운전자명':   dr.name ?? '',
      '연락처':     dr.phone ?? dr.contact ?? '',
      '입차시간':   fmtDeadline(stop.arrival_business_min,         stop.arrival_text, tm),
      '하차시작':   fmtDeadline(stop.unloading_start_business_min, stop.unloading_start_text, tm),
      '하차종료':   fmtDeadline(stop.unloading_end_business_min,   stop.unloading_end_text, tm),
      '납품마감':   fmtDeadline(dlMin, dlText, tm),
      '코드':       p.code ?? '',
      '납품처명':   p.name ?? '',
      '1톤이하':    ck(p.allow_under_1ton),
      '3.5톤이하':  ck(p.allow_under_3_5ton),
      '5톤이상':    ck(p.allow_over_5ton),
      '무인야적납': ck(p.allow_unmanned_yard),
      '대면':       eq(dm, '대면'),
      '검수':       eq(dm, '검수'),
      '무인':       eq(dm, '무인'),
      '보안키':     eq(am, '보안키'),
      '열쇠':       eq(am, '열쇠'),
      '없음':       eq(am, '없음'),
      '창고':       eq(dl, '창고'),
      '탑차':       eq(dl, '탑차'),
      '야적':       eq(dl, '야적'),
      '주소':       p.address ?? '',
      '비고':       stop.memo ?? '',
    };
  }

  /* ─────────── 미리보기 렌더 ─────────── */
  function renderPreview() {
    const flat = state.rows.map(rowToFlat);
    const summary = document.getElementById('summary');
    summary.textContent = `총 ${flat.length}건의 정거장이 출력됩니다.`;

    // 운수사별 카운트
    const byCompany = {};
    flat.forEach(r => { byCompany[r['운수사'] || '(미지정)'] = (byCompany[r['운수사'] || '(미지정)'] || 0) + 1; });
    const breakdown = Object.entries(byCompany)
      .sort((a,b) => b[1]-a[1])
      .map(([k,v]) => `${k}: ${v}건`).join(' · ');
    if (breakdown) summary.textContent += ` (${breakdown})`;

    const thead = document.querySelector('#preview-table thead');
    const tbody = document.querySelector('#preview-table tbody');
    thead.innerHTML = `<tr>${HEADERS.map(h => `<th class="px-2 py-1 text-left whitespace-nowrap text-zinc-300 border-b border-zinc-700">${h}</th>`).join('')}</tr>`;
    tbody.innerHTML = flat.slice(0, 50).map(r => `
      <tr class="hover:bg-zinc-800/50">
        ${HEADERS.map(h => `<td class="px-2 py-1 whitespace-nowrap border-b border-zinc-800/60">${escapeHtml(r[h])}</td>`).join('')}
      </tr>
    `).join('');
    if (flat.length > 50) {
      tbody.innerHTML += `<tr><td colspan="${HEADERS.length}" class="px-2 py-2 text-center text-zinc-500">… 미리보기는 50행까지 표시 (전체 ${flat.length}행)</td></tr>`;
    }
  }

  /* ─────────── 다운로드 ─────────── */
  function buildFilename(ext) {
    const v = document.getElementById('opt-filename').value.trim();
    if (v) return v.endsWith(`.${ext}`) ? v : `${v}.${ext}`;
    const d = new Date();
    const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    return `코스표_${ymd}.${ext}`;
  }

  document.getElementById('btn-download').addEventListener('click', () => {
    if (!state.rows.length) { toast('내려받을 데이터가 없습니다', 'error'); return; }
    const flat = state.rows.map(rowToFlat);
    const fmt = document.getElementById('opt-format').value;

    if (fmt === 'csv') {
      const csv = Papa.unparse({ fields: HEADERS, data: flat.map(r => HEADERS.map(h => r[h] ?? '')) });
      // BOM 포함하여 한글 엑셀 호환
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      saveBlob(blob, buildFilename('csv'));
    } else {
      const ws = XLSX.utils.json_to_sheet(flat, { header: HEADERS });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '코스표');
      XLSX.writeFile(wb, buildFilename('xlsx'));
    }
    toast(`${flat.length}건 내려받기 완료`, 'success');
  });

  function saveBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  /* ─────────── 이벤트 ─────────── */
  document.getElementById('btn-refresh').addEventListener('click', loadData);
  document.getElementById('opt-time-format').addEventListener('change', () => {
    if (state.rows.length) renderPreview();
  });

  /* ─────────── 유틸 ─────────── */
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  /* ─────────── 초기 ─────────── */
  await loadCompanies();
  await loadData(); // 진입 시 자동 로드
</script>

</body>
</html>
