<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>변경 이력 · 코스표 관리 시스템</title>
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* diff 시각화 */
    .diff-table { width: 100%; font-size: 0.8125rem; }
    .diff-table th, .diff-table td {
      padding: 0.4rem 0.6rem;
      border-bottom: 1px solid #27272a;
      vertical-align: top;
      word-break: break-word;
    }
    .diff-table th {
      text-align: left;
      color: #a1a1aa;
      font-weight: 600;
      background: #27272a;
      position: sticky; top: 0;
    }
    .diff-row.changed   { background: rgba(245, 158, 11, 0.06); }
    .diff-row.added     { background: rgba(16, 185, 129, 0.08); }
    .diff-row.removed   { background: rgba(244, 63, 94, 0.08); }
    .diff-old { color: #fb7185; text-decoration: line-through; opacity: 0.85; }
    .diff-new { color: #34d399; }
    .diff-mute { color: #71717a; }
    .json-preview {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.75rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen flex flex-col">

  <header class="border-b border-zinc-800 sticky top-0 z-30 bg-zinc-900/95 backdrop-blur">
    <div class="max-w-[1500px] mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/admin/" class="text-xs text-zinc-400 hover:text-zinc-100">← 관리 허브</a>
      <h1 class="text-base font-semibold">변경 이력</h1>
      <span class="text-[10px] px-1.5 py-0.5 rounded bg-rose-900/40 border border-rose-700 text-rose-200">관리자 전용</span>
      <div class="flex-1"></div>
      <span id="user-badge" class="text-xs text-zinc-400 hidden sm:inline"></span>
      <a href="/" class="btn btn-ghost">대시보드</a>
    </div>
  </header>

  <main class="flex-1 max-w-[1500px] w-full mx-auto px-4 py-3">

    <!-- 필터 -->
    <section class="border border-zinc-700 rounded-lg p-3 mb-3 bg-zinc-800/30">
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2">
        <select id="filter-table" class="app-select">
          <option value="">테이블(전체)</option>
          <option value="routes">코스 (routes)</option>
          <option value="route_stops">정거장 (route_stops)</option>
          <option value="delivery_points">납품처 (delivery_points)</option>
          <option value="drivers">기사 (drivers)</option>
          <option value="vehicles">차량 (vehicles)</option>
          <option value="companies">운수사 (companies)</option>
        </select>
        <select id="filter-action" class="app-select">
          <option value="">액션(전체)</option>
          <option value="INSERT">생성</option>
          <option value="UPDATE">수정</option>
          <option value="DELETE">삭제</option>
        </select>
        <select id="filter-user" class="app-select">
          <option value="">사용자(전체)</option>
        </select>
        <input id="filter-from" type="date" class="app-input" title="시작일">
        <input id="filter-to"   type="date" class="app-input" title="종료일">
        <div class="flex gap-2">
          <button id="apply-btn" class="btn btn-primary flex-1">조회</button>
          <button id="reset-btn" class="btn btn-ghost">초기화</button>
        </div>
      </div>
    </section>

    <!-- 결과 -->
    <div class="flex items-center justify-between mb-2 px-1">
      <div id="result-count" class="text-xs text-zinc-400"></div>
      <div class="flex items-center gap-2">
        <span id="page-info" class="text-xs text-zinc-400"></span>
        <button id="prev-btn" class="btn btn-ghost text-xs" disabled>‹ 이전</button>
        <button id="next-btn" class="btn btn-ghost text-xs" disabled>다음 ›</button>
      </div>
    </div>

    <div class="table-wrap" style="max-height: calc(100vh - 240px);">
      <table class="app-table">
        <thead>
          <tr>
            <th style="width: 170px;">시각</th>
            <th style="width: 140px;">테이블</th>
            <th style="width: 70px;">액션</th>
            <th style="width: 200px;">레코드 ID</th>
            <th style="width: 180px;">사용자</th>
            <th>변경 요약</th>
          </tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
      <div id="empty-msg" class="hidden text-center text-sm text-zinc-500 py-12">
        조건에 맞는 변경 이력이 없습니다.
      </div>
      <div id="loading-indicator" class="hidden text-center text-sm text-zinc-500 py-6">
        불러오는 중...
      </div>
    </div>
  </main>

  <script type="module">
    import { supabase } from '/js/supabase.js';
    import { requireRole } from '/js/auth.js';
    import { toast, openModal, closeModal } from '/js/ui.js';

    // -------------------------------------------------------------------------
    // 권한
    // -------------------------------------------------------------------------
    const me = await requireRole('admin');
    if (!me) { /* 리다이렉트 */ }
    document.getElementById('user-badge').textContent =
      `${me.display_name || me.email || ''} (${me.role})`;

    const $ = (id) => document.getElementById(id);
    const PAGE_SIZE = 50;

    // -------------------------------------------------------------------------
    // 한글 매핑
    // -------------------------------------------------------------------------
    const TABLE_LABEL = {
      routes:          '코스',
      route_stops:     '정거장',
      delivery_points: '납품처',
      drivers:         '기사',
      vehicles:        '차량',
      companies:       '운수사'
    };
    const ACTION_LABEL = { INSERT: '생성', UPDATE: '수정', DELETE: '삭제' };

    // 컬럼명 → 한글 라벨
    const FIELD_LABEL = {
      // 공통
      id: 'ID', name: '이름', memo: '비고',
      created_at: '생성시각', updated_at: '수정시각',

      // companies
      // (특별한 추가 컬럼 없음)

      // drivers
      phone: '연락처', company_id: '운수사',

      // vehicles
      plate_number: '차량번호', tonnage: '톤수', pallet_capacity: '팔레트적재량',

      // delivery_points
      code: '코드', address: '주소', region: '지역', contact: '연락처',
      contact_name: '담당자명', contact_office: '담당자 사무실', contact_mobile: '담당자 휴대폰',
      rep_name: '대표자명', rep_phone: '대표번호',
      allow_under_1ton: '1톤 이하 진입',
      allow_under_3_5ton: '3.5톤 이하 진입',
      allow_over_5ton: '5톤 이상 진입',
      allow_unmanned_yard: '무인 야적 가능',
      delivery_method: '납품방식', access_method: '진입방식', delivery_location: '납품장소',
      deadline_text: '마감(표시)', deadline_business_min: '마감(분)',

      // routes
      car_number: '호차', active: '활성',
      primary_driver_id: '주기사', primary_vehicle_id: '주차량',
      secondary_driver_id: '보조기사', secondary_vehicle_id: '보조차량',

      // route_stops
      route_id: '코스', delivery_point_id: '납품처', stop_order: '순서',
      arrival_text: '입차(표시)', arrival_business_min: '입차(분)',
      unloading_start_text: '하차시작(표시)', unloading_start_business_min: '하차시작(분)',
      unloading_end_text: '하차종료(표시)',  unloading_end_business_min: '하차종료(분)',
      override_delivery_method:   '납품방식 오버라이드',
      override_access_method:     '진입방식 오버라이드',
      override_delivery_location: '납품장소 오버라이드'
    };

    // 항상 표시 안 할 잡음 컬럼 (수정시각은 자동 갱신이라 의미 적음)
    const NOISE_FIELDS = new Set(['updated_at']);

    // -------------------------------------------------------------------------
    // 상태
    // -------------------------------------------------------------------------
    const state = {
      filters: { table: '', action: '', user: '', from: '', to: '' },
      page: 0,           // 0-base
      total: 0,
      rows: [],
      users: new Map()   // user_id -> { email, display_name }
    };

    bindEvents();
    await loadUsers();
    await loadPage();

    // -------------------------------------------------------------------------
    // 사용자 옵션 채우기
    // -------------------------------------------------------------------------
    async function loadUsers() {
      try {
        const { data, error } = await supabase
          .from('user_profiles')
          .select('id, email, display_name')
          .order('display_name');
        if (error) throw error;
        state.users = new Map((data || []).map(u => [u.id, u]));
        const sel = $('filter-user');
        sel.innerHTML = '<option value="">사용자(전체)</option>' +
          (data || []).map(u => `<option value="${u.id}">${escapeHtml(u.display_name || u.email || u.id)}</option>`).join('');
      } catch {
        // 사용자 옵션 로드 실패해도 페이지 동작은 가능
      }
    }

    // -------------------------------------------------------------------------
    // 데이터 로드 (서버 페이지네이션)
    // -------------------------------------------------------------------------
    async function loadPage() {
      const tbody = $('log-tbody');
      tbody.innerHTML = '';
      $('empty-msg').classList.add('hidden');
      $('loading-indicator').classList.remove('hidden');

      const f = state.filters;
      const from = state.page * PAGE_SIZE;
      const to   = from + PAGE_SIZE - 1;

      try {
        let q = supabase
          .from('audit_log')
          .select('*', { count: 'exact' })
          .order('changed_at', { ascending: false })
          .range(from, to);

        if (f.table)  q = q.eq('table_name', f.table);
        if (f.action) q = q.eq('action', f.action);
        if (f.user)   q = q.eq('changed_by', f.user);
        if (f.from)   q = q.gte('changed_at', f.from + 'T00:00:00');
        if (f.to)     q = q.lte('changed_at', f.to   + 'T23:59:59');

        const { data, error, count } = await q;
        if (error) throw error;

        state.rows  = data || [];
        state.total = count ?? 0;
        renderTable();
      } catch (e) {
        toast('변경 이력을 불러오지 못했습니다.', 'error');
        state.rows = [];
        state.total = 0;
        renderTable();
      } finally {
        $('loading-indicator').classList.add('hidden');
      }
    }

    function renderTable() {
      const tbody = $('log-tbody');
      tbody.innerHTML = '';
      const empty = $('empty-msg');

      if (state.rows.length === 0) {
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        const frag = document.createDocumentFragment();
        for (const r of state.rows) {
          const tr = document.createElement('tr');
          tr.classList.add('cursor-pointer');
          tr.innerHTML = `
            <td class="text-xs whitespace-nowrap">${escapeHtml(formatTs(r.changed_at))}</td>
            <td>${escapeHtml(TABLE_LABEL[r.table_name] || r.table_name)}<span class="muted text-[10px] ml-1">${escapeHtml(r.table_name)}</span></td>
            <td>${actionBadge(r.action)}</td>
            <td class="font-mono text-xs muted">${escapeHtml(shortId(r.row_id))}</td>
            <td class="text-xs">${escapeHtml(formatUser(r.changed_by))}</td>
            <td class="text-xs">${summarize(r)}</td>
          `;
          tr.addEventListener('click', () => openDetail(r));
          frag.appendChild(tr);
        }
        tbody.appendChild(frag);
      }

      // 결과 카운트 / 페이지 표시
      $('result-count').textContent =
        state.total === 0 ? '결과 없음' : `총 ${state.total}건`;
      const totalPages = Math.max(1, Math.ceil(state.total / PAGE_SIZE));
      $('page-info').textContent = `${state.page + 1} / ${totalPages} 페이지`;
      $('prev-btn').disabled = state.page <= 0;
      $('next-btn').disabled = state.page >= totalPages - 1;
    }

    // -------------------------------------------------------------------------
    // 셀 렌더 헬퍼
    // -------------------------------------------------------------------------
    function actionBadge(action) {
      const map = {
        INSERT: 'bg-emerald-900/40 border-emerald-700 text-emerald-200',
        UPDATE: 'bg-amber-900/40 border-amber-700 text-amber-200',
        DELETE: 'bg-rose-900/40 border-rose-700 text-rose-200'
      };
      const cls = map[action] || 'bg-zinc-700 border-zinc-600';
      return `<span class="text-[10px] px-1.5 py-0.5 rounded border ${cls}">${escapeHtml(ACTION_LABEL[action] || action)}</span>`;
    }
    function formatTs(s) {
      if (!s) return '';
      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return s;
      return d.toLocaleString('ko-KR', { hour12: false });
    }
    function shortId(id) {
      if (!id) return '';
      return id.length > 13 ? id.slice(0, 8) + '…' + id.slice(-4) : id;
    }
    function formatUser(uid) {
      if (!uid) return '시스템';
      const u = state.users.get(uid);
      if (u) return u.display_name || u.email || uid;
      return shortId(uid);
    }

    // 행의 요약 텍스트
    //   INSERT: 식별 가능한 이름/코드/번호 표시
    //   UPDATE: 변경된 필드 개수 + 처음 3개 필드 라벨
    //   DELETE: 삭제된 행의 식별자
    function summarize(r) {
      const old = r.old_data || {};
      const neu = r.new_data || {};
      if (r.action === 'INSERT') {
        return escapeHtml('새로 생성: ' + identityOf(r.table_name, neu));
      }
      if (r.action === 'DELETE') {
        return escapeHtml('삭제됨: ' + identityOf(r.table_name, old));
      }
      // UPDATE
      const changed = changedFields(old, neu);
      if (changed.length === 0) return '<span class="muted">변경 없음</span>';
      const labels = changed.slice(0, 3).map(k => fieldLabel(k));
      const more = changed.length > 3 ? ` 외 ${changed.length - 3}개` : '';
      return `<span class="text-amber-300">${escapeHtml(`수정: ${labels.join(', ')}${more}`)}</span>`;
    }

    function identityOf(table, row) {
      if (!row) return '';
      const fields = {
        companies:       ['name'],
        drivers:         ['name', 'phone'],
        vehicles:        ['plate_number'],
        delivery_points: ['code', 'name'],
        routes:          ['name', 'car_number'],
        route_stops:     ['stop_order']
      }[table] || ['name', 'id'];
      const parts = fields.map(f => row[f]).filter(v => v != null && v !== '');
      return parts.length ? parts.join(' · ') : (row.id || '');
    }

    function changedFields(oldData, newData) {
      const keys = new Set([...Object.keys(oldData || {}), ...Object.keys(newData || {})]);
      const out = [];
      for (const k of keys) {
        if (NOISE_FIELDS.has(k)) continue;
        if (!isEqual(oldData?.[k], newData?.[k])) out.push(k);
      }
      // 라벨이 있는 필드를 우선
      out.sort((a, b) => {
        const la = FIELD_LABEL[a] ? 0 : 1;
        const lb = FIELD_LABEL[b] ? 0 : 1;
        return la - lb || a.localeCompare(b);
      });
      return out;
    }
    function fieldLabel(k) { return FIELD_LABEL[k] || k; }

    function isEqual(a, b) {
      if (a === b) return true;
      if (a == null && b == null) return true;
      if (a == null || b == null) return false;
      if (typeof a !== typeof b) return String(a) === String(b);
      if (typeof a === 'object') return JSON.stringify(a) === JSON.stringify(b);
      return false;
    }

    // -------------------------------------------------------------------------
    // 상세 모달 (JSON diff 시각화)
    // -------------------------------------------------------------------------
    function openDetail(r) {
      const old = r.old_data || {};
      const neu = r.new_data || {};
      const changed = new Set(changedFields(old, neu));

      // 표시할 필드: union, NOISE 제거, 변경된 것 먼저
      const allKeys = [...new Set([...Object.keys(old), ...Object.keys(neu)])]
        .filter(k => !NOISE_FIELDS.has(k));
      allKeys.sort((a, b) => {
        const ca = changed.has(a) ? 0 : 1;
        const cb = changed.has(b) ? 0 : 1;
        if (ca !== cb) return ca - cb;
        const la = FIELD_LABEL[a] ? 0 : 1;
        const lb = FIELD_LABEL[b] ? 0 : 1;
        return la - lb || a.localeCompare(b);
      });

      const wrap = document.createElement('div');
      wrap.className = 'p-5 max-h-[85vh] overflow-auto';

      const headLine = [
        formatTs(r.changed_at),
        TABLE_LABEL[r.table_name] || r.table_name,
        ACTION_LABEL[r.action] || r.action,
        formatUser(r.changed_by)
      ].filter(Boolean).join(' · ');

      let rowsHtml = '';
      if (r.action === 'INSERT' || r.action === 'DELETE') {
        // 한쪽만 존재
        const data = r.action === 'INSERT' ? neu : old;
        rowsHtml = allKeys.map(k => {
          const v = data?.[k];
          if (v == null || v === '') return '';
          const cls = r.action === 'INSERT' ? 'added' : 'removed';
          const valHtml = renderValue(v);
          const colClass = r.action === 'INSERT' ? 'diff-new' : 'diff-old';
          return `
            <tr class="diff-row ${cls}">
              <td style="width: 200px;">
                <div>${escapeHtml(fieldLabel(k))}</div>
                <div class="text-[10px] muted">${escapeHtml(k)}</div>
              </td>
              <td class="${colClass}">${valHtml}</td>
            </tr>
          `;
        }).join('');

        wrap.innerHTML = `
          <div class="flex items-start justify-between mb-3">
            <div>
              <h2 class="text-base font-semibold">변경 상세</h2>
              <div class="text-xs muted mt-0.5">${escapeHtml(headLine)}</div>
              <div class="text-[11px] muted mt-1">레코드 ID: <span class="font-mono">${escapeHtml(r.row_id || '')}</span></div>
            </div>
            <button data-x class="btn btn-ghost text-xs">닫기</button>
          </div>
          <table class="diff-table">
            <thead>
              <tr>
                <th>필드</th>
                <th>${r.action === 'INSERT' ? '값 (생성)' : '값 (삭제)'}</th>
              </tr>
            </thead>
            <tbody>${rowsHtml || `<tr><td colspan="2" class="muted text-center py-6">표시할 필드가 없습니다.</td></tr>`}</tbody>
          </table>
          ${rawSection(r)}
        `;
      } else {
        // UPDATE: before / after 양쪽
        rowsHtml = allKeys.map(k => {
          const before = old?.[k];
          const after  = neu?.[k];
          const isChanged = changed.has(k);
          const cls = isChanged ? 'changed' : '';
          return `
            <tr class="diff-row ${cls}">
              <td style="width: 200px;">
                <div>${escapeHtml(fieldLabel(k))}</div>
                <div class="text-[10px] muted">${escapeHtml(k)}</div>
              </td>
              <td class="${isChanged ? 'diff-old' : 'diff-mute'}">${renderValue(before)}</td>
              <td class="${isChanged ? 'diff-new' : 'diff-mute'}">${renderValue(after)}</td>
            </tr>
          `;
        }).join('');

        wrap.innerHTML = `
          <div class="flex items-start justify-between mb-3">
            <div>
              <h2 class="text-base font-semibold">변경 상세</h2>
              <div class="text-xs muted mt-0.5">${escapeHtml(headLine)}</div>
              <div class="text-[11px] muted mt-1">
                레코드 ID: <span class="font-mono">${escapeHtml(r.row_id || '')}</span>
                <span class="ml-2">변경된 필드 ${changed.size}개</span>
              </div>
            </div>
            <button data-x class="btn btn-ghost text-xs">닫기</button>
          </div>
          <table class="diff-table">
            <thead>
              <tr>
                <th>필드</th>
                <th>이전</th>
                <th>이후</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
          ${rawSection(r)}
        `;
      }

      openModal(wrap, { width: 'xl' });
      wrap.querySelectorAll('[data-x]').forEach(b => b.addEventListener('click', closeModal));
    }

    // 원본 JSON 펼쳐보기
    function rawSection(r) {
      return `
        <details class="mt-4 border border-zinc-700 rounded-md">
          <summary class="px-3 py-2 cursor-pointer text-sm">원본 JSON 보기</summary>
          <div class="p-3 grid ${r.old_data && r.new_data ? 'grid-cols-2 gap-3' : 'grid-cols-1'}">
            ${r.old_data ? `
              <div>
                <div class="text-xs muted mb-1">old_data</div>
                <pre class="json-preview bg-zinc-900 border border-zinc-700 rounded p-2">${escapeHtml(safeStringify(r.old_data))}</pre>
              </div>` : ''}
            ${r.new_data ? `
              <div>
                <div class="text-xs muted mb-1">new_data</div>
                <pre class="json-preview bg-zinc-900 border border-zinc-700 rounded p-2">${escapeHtml(safeStringify(r.new_data))}</pre>
              </div>` : ''}
          </div>
        </details>
      `;
    }

    // 값 렌더링: boolean/null/긴 문자열/객체 처리
    function renderValue(v) {
      if (v === null || v === undefined || v === '') {
        return `<span class="diff-mute">∅</span>`;
      }
      if (typeof v === 'boolean') {
        return v
          ? '<span class="text-emerald-300">참</span>'
          : '<span class="text-rose-300">거짓</span>';
      }
      if (typeof v === 'object') {
        return `<pre class="json-preview">${escapeHtml(safeStringify(v))}</pre>`;
      }
      return escapeHtml(String(v));
    }
    function safeStringify(o) {
      try { return JSON.stringify(o, null, 2); } catch { return String(o); }
    }

    // -------------------------------------------------------------------------
    // 이벤트
    // -------------------------------------------------------------------------
    function bindEvents() {
      $('apply-btn').addEventListener('click', () => {
        readFiltersFromInputs();
        state.page = 0;
        loadPage();
      });
      $('reset-btn').addEventListener('click', () => {
        $('filter-table').value  = '';
        $('filter-action').value = '';
        $('filter-user').value   = '';
        $('filter-from').value   = '';
        $('filter-to').value     = '';
        readFiltersFromInputs();
        state.page = 0;
        loadPage();
      });
      $('prev-btn').addEventListener('click', () => {
        if (state.page > 0) { state.page--; loadPage(); }
      });
      $('next-btn').addEventListener('click', () => {
        const totalPages = Math.max(1, Math.ceil(state.total / PAGE_SIZE));
        if (state.page < totalPages - 1) { state.page++; loadPage(); }
      });

      // Enter 키로 조회
      ['filter-from', 'filter-to'].forEach(id => {
        $(id).addEventListener('keydown', (e) => {
          if (e.key === 'Enter') $('apply-btn').click();
        });
      });
    }

    function readFiltersFromInputs() {
      state.filters = {
        table:  $('filter-table').value,
        action: $('filter-action').value,
        user:   $('filter-user').value,
        from:   $('filter-from').value,
        to:     $('filter-to').value
      };
    }

    // -------------------------------------------------------------------------
    // 헬퍼
    // -------------------------------------------------------------------------
    function escapeHtml(s) {
      return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
        .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
  </script>
</body>
</html>
