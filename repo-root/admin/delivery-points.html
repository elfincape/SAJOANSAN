<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>납품처 관리 · 코스표 관리 시스템</title>
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen flex flex-col">

  <!-- 헤더 -->
  <header class="border-b border-zinc-800 sticky top-0 z-30 bg-zinc-900/95 backdrop-blur">
    <div class="max-w-[1600px] mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/admin/" class="text-xs text-zinc-400 hover:text-zinc-100">← 관리 허브</a>
      <h1 class="text-base font-semibold">납품처 관리</h1>
      <div class="flex-1"></div>
      <span id="user-badge" class="text-xs text-zinc-400 hidden sm:inline"></span>
      <a href="/" class="btn btn-ghost">대시보드</a>
    </div>
  </header>

  <!-- 본문: 좌측 목록 / 우측 폼 -->
  <main class="flex-1 max-w-[1600px] w-full mx-auto px-4 py-3">
    <div class="grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_minmax(420px,520px)] gap-4">

      <!-- ===== 좌측: 목록 ===================================== -->
      <section class="border border-zinc-700 rounded-lg overflow-hidden flex flex-col"
               style="min-height: 70vh;">
        <div class="p-3 border-b border-zinc-700 bg-zinc-800/50 flex flex-wrap gap-2 items-center">
          <input id="search-input" type="search" placeholder="코드/이름/주소 검색"
                 class="app-input flex-1 min-w-[180px]">
          <select id="filter-region" class="app-select w-32">
            <option value="">지역(전체)</option>
          </select>
          <select id="filter-method" class="app-select w-32">
            <option value="">납품방식(전체)</option>
            <option value="대면">대면</option>
            <option value="검수">검수</option>
            <option value="무인">무인</option>
          </select>
          <select id="sort-key" class="app-select w-28">
            <option value="code">코드순</option>
            <option value="name">이름순</option>
          </select>
          <button id="new-btn" class="btn btn-primary">+ 신규</button>
        </div>

        <div class="table-wrap" style="max-height: calc(100vh - 220px); border: none; border-radius: 0;">
          <table class="app-table">
            <thead>
              <tr>
                <th>코드</th>
                <th>이름</th>
                <th>지역</th>
                <th>납품방식</th>
                <th>마감</th>
              </tr>
            </thead>
            <tbody id="dp-tbody"></tbody>
          </table>
          <div id="empty-msg" class="hidden text-center text-sm text-zinc-500 py-12">
            조건에 맞는 납품처가 없습니다.
          </div>
        </div>

        <div class="px-3 py-2 border-t border-zinc-700 text-xs text-zinc-400 flex items-center justify-between">
          <span id="result-count"></span>
          <span id="loading-indicator" class="hidden">불러오는 중...</span>
        </div>
      </section>

      <!-- ===== 우측: 폼 ===================================== -->
      <section class="border border-zinc-700 rounded-lg bg-zinc-800/30">
        <div class="px-4 py-3 border-b border-zinc-700 flex items-center gap-3">
          <h2 id="form-title" class="text-sm font-semibold">새 납품처</h2>
          <span id="form-mode-badge" class="text-[10px] px-1.5 py-0.5 rounded bg-zinc-700 text-zinc-300">신규</span>
          <div class="flex-1"></div>
          <span id="form-meta" class="text-[11px] text-zinc-500"></span>
        </div>

        <form id="dp-form" class="p-4 space-y-4" novalidate>
          <input type="hidden" id="f-id">

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="app-label">코드</label>
              <input id="f-code" class="app-input" placeholder="예: A001">
            </div>
            <div>
              <label class="app-label">이름 *</label>
              <input id="f-name" class="app-input" required>
            </div>
          </div>

          <div>
            <label class="app-label">주소</label>
            <div class="flex gap-2">
              <input id="f-address" class="app-input flex-1">
              <button type="button" id="btn-extract-region" class="btn btn-ghost text-xs whitespace-nowrap">지역 자동추출</button>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="app-label">지역</label>
              <input id="f-region" class="app-input" placeholder="예: 서울 강남구">
            </div>
            <div>
              <label class="app-label">납품마감</label>
              <input id="f-deadline" class="app-input biz-time" placeholder="예: 22:00 또는 25:30">
              <p class="text-[10px] text-zinc-500 mt-1">04:00~27:59 범위. 비워두면 마감 없음.</p>
            </div>
          </div>

          <fieldset>
            <legend class="app-label">진입조건 (가능 여부)</legend>
            <div class="grid grid-cols-2 gap-1.5">
              <label class="cb"><input type="checkbox" id="f-1ton">    1톤 이하</label>
              <label class="cb"><input type="checkbox" id="f-3_5ton">  3.5톤 이하</label>
              <label class="cb"><input type="checkbox" id="f-5ton">    5톤 이상</label>
              <label class="cb"><input type="checkbox" id="f-yard">    무인 야적</label>
            </div>
          </fieldset>

          <div class="grid grid-cols-3 gap-3">
            <fieldset>
              <legend class="app-label">납품방식</legend>
              <div class="space-y-1">
                <label class="cb"><input type="radio" name="dmethod" value="대면"> 대면</label>
                <label class="cb"><input type="radio" name="dmethod" value="검수"> 검수</label>
                <label class="cb"><input type="radio" name="dmethod" value="무인"> 무인</label>
                <label class="cb text-zinc-500"><input type="radio" name="dmethod" value=""> 미지정</label>
              </div>
            </fieldset>
            <fieldset>
              <legend class="app-label">진입방식</legend>
              <div class="space-y-1">
                <label class="cb"><input type="radio" name="amethod" value="보안키"> 보안키</label>
                <label class="cb"><input type="radio" name="amethod" value="열쇠">   열쇠</label>
                <label class="cb"><input type="radio" name="amethod" value="없음">   없음</label>
                <label class="cb text-zinc-500"><input type="radio" name="amethod" value=""> 미지정</label>
              </div>
            </fieldset>
            <fieldset>
              <legend class="app-label">납품장소</legend>
              <div class="space-y-1">
                <label class="cb"><input type="radio" name="dloc" value="창고"> 창고</label>
                <label class="cb"><input type="radio" name="dloc" value="탑차"> 탑차</label>
                <label class="cb"><input type="radio" name="dloc" value="야적"> 야적</label>
                <label class="cb text-zinc-500"><input type="radio" name="dloc" value=""> 미지정</label>
              </div>
            </fieldset>
          </div>

          <div class="divider"></div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="app-label">대표자명</label>
              <input id="f-rep-name" class="app-input">
            </div>
            <div>
              <label class="app-label">대표번호</label>
              <input id="f-rep-phone" class="app-input" placeholder="예: 02-1234-5678">
            </div>
            <div>
              <label class="app-label">담당자명</label>
              <input id="f-mgr-name" class="app-input">
            </div>
            <div>
              <label class="app-label">담당자 사무실</label>
              <input id="f-mgr-office" class="app-input">
            </div>
            <div class="col-span-2">
              <label class="app-label">담당자 휴대폰</label>
              <input id="f-mgr-mobile" class="app-input">
            </div>
          </div>

          <div>
            <label class="app-label">비고</label>
            <textarea id="f-memo" rows="2" class="app-textarea"></textarea>
          </div>

          <div class="flex items-center gap-2 pt-2 border-t border-zinc-700">
            <button type="submit" id="btn-save" class="btn btn-primary">저장</button>
            <button type="button" id="btn-cancel" class="btn btn-ghost">취소</button>
            <div class="flex-1"></div>
            <button type="button" id="btn-delete" class="btn btn-danger hidden">삭제</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script type="module">
    import { supabase } from '/js/supabase.js';
    import { requireRole, getCurrentProfile } from '/js/auth.js';
    import { bizMinToDisplay, displayToBizMin } from '/js/time.js';
    import { toast, confirmDialog, formatPhone } from '/js/ui.js';

    // -------------------------------------------------------------------------
    // 컬럼 / 스키마 매핑
    //   ※ 컨텍스트의 delivery_points 필드 + 추가 연락처 필드를 확장 매핑한다.
    //     스키마에 contact_name / contact_office / contact_mobile / rep_name /
    //     rep_phone 컬럼이 없다면 마이그레이션이 필요할 수 있다 (하단 메모 참고).
    // -------------------------------------------------------------------------

    // -------------------------------------------------------------------------
    // 권한
    // -------------------------------------------------------------------------
    const profile = await requireRole('editor');
    if (!profile) { /* 리다이렉트 */ }
    document.getElementById('user-badge').textContent =
      `${profile.display_name || profile.email || ''} (${profile.role})`;

    // -------------------------------------------------------------------------
    // 상태
    // -------------------------------------------------------------------------
    const state = {
      rows: [],
      filtered: [],
      selectedId: null,
      filters: { search: '', region: '', method: '' },
      sort: 'code'
    };

    // DOM 캐시
    const $ = (id) => document.getElementById(id);
    const tbody = $('dp-tbody');

    // -------------------------------------------------------------------------
    // 부트
    // -------------------------------------------------------------------------
    bindEvents();
    await loadList();
    resetForm();

    // -------------------------------------------------------------------------
    // 목록 로드
    // -------------------------------------------------------------------------
    async function loadList() {
      $('loading-indicator').classList.remove('hidden');
      try {
        const { data, error } = await supabase
          .from('delivery_points')
          .select('*');
        if (error) throw error;
        state.rows = data || [];
        // 지역 필터 옵션 채우기
        const regions = [...new Set(state.rows.map(r => r.region).filter(Boolean))]
          .sort((a, b) => a.localeCompare(b, 'ko'));
        const sel = $('filter-region');
        const cur = sel.value;
        sel.innerHTML = '<option value="">지역(전체)</option>' +
          regions.map(r => `<option value="${escapeAttr(r)}">${escapeHtml(r)}</option>`).join('');
        sel.value = cur;
      } catch (e) {
        toast('납품처 목록을 불러오지 못했습니다.', 'error');
        state.rows = [];
      } finally {
        $('loading-indicator').classList.add('hidden');
      }
      applyAndRender();
    }

    function applyAndRender() {
      const f = state.filters;
      const q = f.search.toLowerCase();
      state.filtered = state.rows.filter(r => {
        if (f.region && r.region !== f.region) return false;
        if (f.method && r.delivery_method !== f.method) return false;
        if (q) {
          const hay = [r.code, r.name, r.address].filter(Boolean).join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      const key = state.sort === 'name' ? 'name' : 'code';
      state.filtered.sort((a, b) => String(a[key] ?? '').localeCompare(String(b[key] ?? ''), 'ko', { numeric: true }));
      renderList();
    }

    function renderList() {
      tbody.innerHTML = '';
      const empty = $('empty-msg');
      if (state.filtered.length === 0) {
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        const frag = document.createDocumentFragment();
        for (const r of state.filtered) {
          const tr = document.createElement('tr');
          tr.dataset.id = r.id;
          if (r.id === state.selectedId) tr.classList.add('selected');
          tr.classList.add('cursor-pointer');
          tr.innerHTML = `
            <td>${escapeHtml(r.code || '')}</td>
            <td>${escapeHtml(r.name || '')}</td>
            <td>${escapeHtml(r.region || '')}</td>
            <td>${escapeHtml(r.delivery_method || '')}</td>
            <td class="biz-time">${escapeHtml(bizMinToDisplay(r.deadline_business_min))}</td>
          `;
          tr.addEventListener('click', () => selectRow(r.id));
          frag.appendChild(tr);
        }
        tbody.appendChild(frag);
      }
      $('result-count').textContent =
        state.rows.length === 0 ? '데이터 없음'
        : (state.filtered.length === state.rows.length
            ? `총 ${state.rows.length}건`
            : `총 ${state.filtered.length}건 (전체 ${state.rows.length}건 중)`);
    }

    // -------------------------------------------------------------------------
    // 폼 ↔ 객체 변환
    // -------------------------------------------------------------------------
    function rowToForm(r) {
      $('f-id').value             = r?.id || '';
      $('f-code').value           = r?.code || '';
      $('f-name').value           = r?.name || '';
      $('f-address').value        = r?.address || '';
      $('f-region').value         = r?.region || '';
      $('f-deadline').value       = r?.deadline_text || (r?.deadline_business_min != null ? bizMinToDisplay(r.deadline_business_min) : '');

      $('f-1ton').checked   = !!r?.allow_under_1ton;
      $('f-3_5ton').checked = !!r?.allow_under_3_5ton;
      $('f-5ton').checked   = !!r?.allow_over_5ton;
      $('f-yard').checked   = !!r?.allow_unmanned_yard;

      setRadio('dmethod', r?.delivery_method || '');
      setRadio('amethod', r?.access_method   || '');
      setRadio('dloc',    r?.delivery_location || '');

      $('f-rep-name').value    = r?.rep_name      || '';
      $('f-rep-phone').value   = r?.rep_phone     || '';
      $('f-mgr-name').value    = r?.contact_name  || '';
      $('f-mgr-office').value  = r?.contact_office|| '';
      $('f-mgr-mobile').value  = r?.contact_mobile || r?.contact || '';
      $('f-memo').value        = r?.memo || '';

      // 헤더
      const isEdit = !!r?.id;
      $('form-title').textContent = isEdit ? (r.name || '(이름 없음)') : '새 납품처';
      $('form-mode-badge').textContent = isEdit ? '편집' : '신규';
      $('form-meta').textContent = isEdit && r.updated_at
        ? `최종수정: ${new Date(r.updated_at).toLocaleString('ko-KR')}` : '';
      $('btn-delete').classList.toggle('hidden', !isEdit);
    }

    // 폼 → 저장용 객체. 시간은 displayToBizMin으로 동시 저장.
    function formToRow() {
      const deadlineText = $('f-deadline').value.trim();
      const deadlineBiz  = deadlineText ? displayToBizMin(normalizeTime(deadlineText)) : null;

      return {
        id:    $('f-id').value || undefined,
        code:  emptyToNull($('f-code').value.trim()),
        name:  $('f-name').value.trim(),
        address: emptyToNull($('f-address').value.trim()),
        region:  emptyToNull($('f-region').value.trim()),

        allow_under_1ton:    $('f-1ton').checked,
        allow_under_3_5ton:  $('f-3_5ton').checked,
        allow_over_5ton:     $('f-5ton').checked,
        allow_unmanned_yard: $('f-yard').checked,

        delivery_method:   getRadio('dmethod') || null,
        access_method:     getRadio('amethod') || null,
        delivery_location: getRadio('dloc')    || null,

        deadline_text:         deadlineText ? normalizeTime(deadlineText) : null,
        deadline_business_min: deadlineBiz,

        rep_name:       emptyToNull($('f-rep-name').value.trim()),
        rep_phone:      emptyToNull($('f-rep-phone').value.trim()),
        contact_name:   emptyToNull($('f-mgr-name').value.trim()),
        contact_office: emptyToNull($('f-mgr-office').value.trim()),
        contact_mobile: emptyToNull($('f-mgr-mobile').value.trim()),
        // 호환: 단일 contact 컬럼이 있으면 휴대폰을 동기화
        contact:        emptyToNull($('f-mgr-mobile').value.trim()),
        memo:           emptyToNull($('f-memo').value.trim())
      };
    }

    // -------------------------------------------------------------------------
    // 이벤트 바인딩
    // -------------------------------------------------------------------------
    function bindEvents() {
      $('search-input').addEventListener('input', debounce(() => {
        state.filters.search = $('search-input').value.trim();
        applyAndRender();
      }, 200));
      $('filter-region').addEventListener('change', () => {
        state.filters.region = $('filter-region').value;
        applyAndRender();
      });
      $('filter-method').addEventListener('change', () => {
        state.filters.method = $('filter-method').value;
        applyAndRender();
      });
      $('sort-key').addEventListener('change', () => {
        state.sort = $('sort-key').value;
        applyAndRender();
      });

      $('new-btn').addEventListener('click', () => {
        state.selectedId = null;
        renderList();
        resetForm();
      });

      $('btn-cancel').addEventListener('click', () => {
        if (state.selectedId) {
          // 편집 중이면 원본으로 되돌림
          const r = state.rows.find(x => x.id === state.selectedId);
          if (r) rowToForm(r);
        } else {
          resetForm();
        }
      });

      $('btn-extract-region').addEventListener('click', () => {
        const addr = $('f-address').value.trim();
        const region = extractRegionFromAddress(addr);
        if (region) {
          $('f-region').value = region;
          toast(`지역을 "${region}"으로 설정했습니다.`, 'success');
        } else {
          toast('주소에서 지역을 추출하지 못했습니다.', 'warn');
        }
      });

      // 시간 입력: blur 시 정규화 + 검증
      const dl = $('f-deadline');
      dl.addEventListener('blur', () => {
        const v = dl.value.trim();
        if (!v) return;
        const norm = normalizeTime(v);
        if (!norm) {
          toast('시간 형식이 올바르지 않습니다. 예: 22:00, 25:30', 'warn');
          return;
        }
        const biz = displayToBizMin(norm);
        if (biz == null) {
          toast('시간은 04:00 ~ 27:59 범위여야 합니다.', 'warn');
          return;
        }
        dl.value = norm;
      });

      // 저장
      $('dp-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await saveForm();
      });

      // 삭제
      $('btn-delete').addEventListener('click', async () => {
        await deleteCurrent();
      });
    }

    // -------------------------------------------------------------------------
    // 행 선택 / 폼 초기화
    // -------------------------------------------------------------------------
    function selectRow(id) {
      state.selectedId = id;
      renderList();
      const r = state.rows.find(x => x.id === id);
      if (r) rowToForm(r);
    }

    function resetForm() {
      state.selectedId = null;
      rowToForm(null);
    }

    // -------------------------------------------------------------------------
    // 저장 (upsert)
    // -------------------------------------------------------------------------
    async function saveForm() {
      const row = formToRow();

      if (!row.name) {
        toast('이름은 필수입니다.', 'warn');
        $('f-name').focus();
        return;
      }

      // 시간 입력 재검증
      if ($('f-deadline').value.trim()) {
        const norm = normalizeTime($('f-deadline').value.trim());
        if (!norm || displayToBizMin(norm) == null) {
          toast('마감 시간 형식이 올바르지 않습니다.', 'warn');
          return;
        }
      }

      $('btn-save').disabled = true;
      try {
        // id 없으면 신규
        const payload = { ...row };
        if (!payload.id) delete payload.id;

        const { data, error } = await supabase
          .from('delivery_points')
          .upsert(payload, { onConflict: 'id' })
          .select()
          .single();

        if (error) {
          // 코드 unique 위반 등
          if (error.code === '23505') {
            toast('이미 사용 중인 코드입니다.', 'error');
          } else {
            toast(`저장 실패: ${error.message}`, 'error');
          }
          return;
        }

        toast(row.id ? '수정되었습니다.' : '추가되었습니다.', 'success');
        // 목록 갱신 + 방금 저장한 행 선택 유지
        const savedId = data.id;
        await loadList();
        selectRow(savedId);
      } catch (e) {
        toast('저장 중 오류가 발생했습니다.', 'error');
      } finally {
        $('btn-save').disabled = false;
      }
    }

    // -------------------------------------------------------------------------
    // 삭제 (사용 중인 route_stops 개수 확인 → 경고)
    // -------------------------------------------------------------------------
    async function deleteCurrent() {
      const id = $('f-id').value;
      if (!id) return;
      const r = state.rows.find(x => x.id === id);

      // 사용 중인 정거장 수
      let inUse = 0;
      try {
        const { count } = await supabase
          .from('route_stops')
          .select('id', { count: 'exact', head: true })
          .eq('delivery_point_id', id);
        inUse = count || 0;
      } catch {
        // 카운트 실패는 진행에 치명적이지 않으므로 무시
      }

      let msg = `"${r?.name || '이 납품처'}"를 삭제할까요?`;
      if (inUse > 0) {
        msg += `\n\n⚠ 이 납품처를 사용 중인 정거장이 ${inUse}개 있습니다.\n` +
               `정거장에서 사용 중이면 DB 제약상 삭제가 거부됩니다.\n` +
               `먼저 해당 정거장들을 정리한 뒤 다시 시도하세요.`;
      }
      const ok = await confirmDialog(msg, { okText: '삭제', cancelText: '취소', danger: true });
      if (!ok) return;

      try {
        const { error } = await supabase
          .from('delivery_points')
          .delete()
          .eq('id', id);
        if (error) {
          if (error.code === '23503') {
            toast('정거장에서 사용 중이라 삭제할 수 없습니다.', 'error');
          } else {
            toast(`삭제 실패: ${error.message}`, 'error');
          }
          return;
        }
        toast('삭제되었습니다.', 'success');
        await loadList();
        resetForm();
      } catch {
        toast('삭제 중 오류가 발생했습니다.', 'error');
      }
    }

    // -------------------------------------------------------------------------
    // 헬퍼
    // -------------------------------------------------------------------------

    // 시간 입력 정규화: "9:5" → "09:05", 한 자리들 보정
    function normalizeTime(str) {
      if (!str) return '';
      const s = str.trim();
      const m = s.match(/^(\d{1,2})\s*[:.시]\s*(\d{1,2})\s*분?$/);
      if (!m) return '';
      const h = parseInt(m[1], 10);
      const mn = parseInt(m[2], 10);
      if (Number.isNaN(h) || Number.isNaN(mn)) return '';
      if (mn < 0 || mn > 59) return '';
      // 표시는 24시 넘김 표기를 그대로 허용 (04~27)
      if (h < 0 || h > 27) return '';
      // 04 미만(00~03)은 다음날 의미. 표시 자체는 그대로 두지만
      // 너무 이른 시간(04 미만이면서 +24 적용 후 28시 이상)은 차단됨
      return `${String(h).padStart(2, '0')}:${String(mn).padStart(2, '0')}`;
    }

    // 주소에서 시/구 또는 시/군 추출 (간단한 휴리스틱)
    function extractRegionFromAddress(addr) {
      if (!addr) return '';
      const s = addr.trim();

      // 광역시/도 + (시|군|구) 형태를 우선 추출
      // 예: "서울특별시 강남구 ..." → "서울 강남구"
      //     "경기도 성남시 분당구 ..." → "성남시 분당구"
      const tokens = s.split(/\s+/);
      const out = [];
      for (const t of tokens) {
        if (out.length === 0 && /(특별시|광역시|특별자치시|특별자치도|도)$/.test(t)) {
          out.push(t.replace(/(특별시|광역시|특별자치시|특별자치도|도)$/, ''));
          continue;
        }
        if (/(시|군|구)$/.test(t)) {
          out.push(t);
          // 성남시 분당구 같은 2단계까지
          if (out.length >= 3) break;
        } else if (out.length > 0) {
          // 광역 다음 처음 만난 비-시/군/구 토큰은 멈춤
          break;
        }
      }
      return out.join(' ').trim();
    }

    function setRadio(name, val) {
      const list = document.querySelectorAll(`input[name="${name}"]`);
      list.forEach(el => { el.checked = (el.value === (val || '')); });
    }
    function getRadio(name) {
      const el = document.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : '';
    }
    function emptyToNull(v) { return v === '' || v == null ? null : v; }
    function escapeHtml(s) {
      return String(s ?? '')
        .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function escapeAttr(s) { return escapeHtml(s); }
    function debounce(fn, wait) {
      let t = null;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
    }
  </script>
</body>
